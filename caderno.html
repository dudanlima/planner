<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Caderno Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        @font-face { 
            font-family: 'Hello'; 
            src: url('fonts/Hello.otf') format('opentype'); 
        }

        :root {
            --rosa-claro: #fff0f5; --rosa-destaque: #ffb6c1; --pink-vibrante: #ff69b4;
            --texto: #444; --borda: #fce4ec;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #fff9fb; color: var(--texto); overflow: hidden; }

        @media print {
            .sidebar, .notes-panel, .toolbar, #save-status { display: none !important; }
            body { background: white; overflow: visible; }
            .editor-container { border: none; box-shadow: none; margin: 0; }
            #editor-title { font-family: 'Hello' !important; color: black; }
        }

        .sidebar { width: 250px; background: white; border-right: 1px solid var(--borda); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .sidebar h1 { font-family: 'Hello', cursive; font-size: 3rem; color: var(--rosa-destaque); text-align: center; margin-bottom: 15px; font-weight: normal; }

        .subject-list { list-style: none; padding: 0; flex-grow: 1; overflow-y: auto; }
        .subject-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 0.85rem; }
        .subject-item.active { background: var(--rosa-claro); color: var(--pink-vibrante); border: 1px solid var(--rosa-destaque); font-weight: 600; }

        .notes-panel { width: 220px; background: #fffafa; border-right: 1px solid var(--borda); padding: 20px; flex-shrink: 0; }
        .note-list { list-style: none; padding: 0; }
        .note-list-item { padding: 10px; margin-bottom: 5px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; border-bottom: 1px solid #f0f0f0; }
        .note-list-item.active { background: white; font-weight: 600; border-left: 3px solid var(--pink-vibrante); }

        .editor-container { flex-grow: 1; display: flex; flex-direction: column; background: white; margin: 15px; border-radius: 25px; box-shadow: 0 5px 20px rgba(255,182,193,0.1); overflow: hidden; }
        .toolbar { padding: 10px 20px; border-bottom: 1px solid var(--borda); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; background: #fffafb; }
        .toolbar button, .toolbar select { background: white; border: 1px solid var(--borda); border-radius: 5px; padding: 5px 8px; cursor: pointer; font-family: inherit; font-size: 0.75rem; height: 32px; }
        
        .btn-recording { background: #ffeb3b !important; color: black !important; font-weight: bold; }

        #editor-title { font-family: 'Hello', sans-serif; font-size: 2.8rem; border: none; outline: none; color: var(--rosa-destaque); width: 100%; padding: 20px 30px 0; background: transparent; }
        .editor-content { flex-grow: 1; padding: 30px; overflow-y: auto; outline: none; line-height: 1.6; }

        .btn-add { background: var(--rosa-destaque); color: white; border: none; padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Caderno</h1>
        <a href="index.html" style="text-decoration:none; color:var(--rosa-destaque); font-size:0.7rem; text-align:center; display:block; margin-bottom:20px;">📅 voltar ao planner</a>
        <ul class="subject-list" id="subject-list"></ul>
        <button class="btn-add" onclick="addSubject()">+ nova matéria</button>
    </div>

    <div class="notes-panel">
        <button onclick="addNote()" style="background:transparent; border:1px dashed var(--rosa-destaque); color:var(--rosa-destaque); padding:10px; border-radius:12px; cursor:pointer; width:100%; margin-bottom:15px;">+ nova página</button>
        <ul class="note-list" id="note-list"></ul>
    </div>

    <div class="editor-container">
        <input type="text" id="editor-title" placeholder="Título..." oninput="saveData()">
        
        <div class="toolbar">
            <button onclick="format('bold')"><b>B</b></button>
            <button onclick="format('justifyCenter')">↔</button>
            <select id="font-selector" onchange="applyFont(this.value)" style="width:140px;"></select>
            <select onchange="format('fontSize', this.value)">
                <option value="3">14px</option><option value="5">18px</option><option value="7">32px</option>
            </select>
            <input type="color" onchange="format('foreColor', this.value)" style="width:40px; height:32px; border:1px solid var(--borda);">
            
            <button id="btn-speech" onclick="toggleTranscription()">🎤 Transcrever</button>
            <button onclick="window.print()">🖨️ PDF</button>
        </div>

        <div id="editor-body" class="editor-content" contenteditable="true" oninput="saveData()"></div>
        <div id="save-status" style="font-size:0.6rem; color:#ccc; text-align:right; padding:10px 20px;">salvo</div>
    </div>

    <script>
        // ADICIONE OS NOMES DOS ARQUIVOS AQUI
        const fontes = ['Hello.otf', 'Better Together.otf', 'Warung Kopi.otf']; 

        function carregarFontes() {
            const sel = document.getElementById('font-selector');
            const opt = document.createElement('option'); opt.value="Poppins"; opt.innerText="Poppins"; sel.appendChild(opt);
            
            fontes.forEach(f => {
                const nome = f.split('.')[0];
                const face = new FontFace(nome, `url(fonts/${f})`);
                face.load().then(l => {
                    document.fonts.add(l);
                    const o = document.createElement('option'); o.value=nome; o.innerText=nome; sel.appendChild(o);
                }).catch(e => console.log("Erro:", f));
            });
        }

        // LÓGICA DE TRANSCRIÇÃO CORRIGIDA
        let recognition;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'pt-BR';
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript;
                document.execCommand('insertText', false, text + ' ');
            };

            recognition.onerror = (e) => {
                console.error("Erro na transcrição:", e);
                stopRec();
            };
        }

        function toggleTranscription() {
            if (!recognition) return alert("Navegador incompatível.");
            if (!isRecording) startRec(); else stopRec();
        }

        function startRec() {
            recognition.start();
            isRecording = true;
            document.getElementById('btn-speech').classList.add('btn-recording');
            document.getElementById('btn-speech').innerText = "🛑 Parar";
        }

        function stopRec() {
            recognition.stop();
            isRecording = false;
            document.getElementById('btn-speech').classList.remove('btn-recording');
            document.getElementById('btn-speech').innerText = "🎤 Transcrever";
        }

        function format(cmd, val=null) { document.execCommand(cmd, false, val); saveData(); }
        function applyFont(f) { document.execCommand('fontName', false, f); saveData(); }

        let notebookData = JSON.parse(localStorage.getItem('notebook-data-v3')) || { "Geral": [{ title: "Nova Nota", body: "" }] };
        let currentSubject = localStorage.getItem('last-subject') || "Geral";
        let currentNoteIdx = 0;

        function renderSubjects() {
            const list = document.getElementById('subject-list'); list.innerHTML = '';
            Object.keys(notebookData).forEach(s => {
                const li = document.createElement('li');
                li.className = `subject-item ${s === currentSubject ? 'active' : ''}`;
                li.innerText = s;
                li.onclick = () => { currentSubject = s; currentNoteIdx = 0; renderSubjects(); };
                list.appendChild(li);
            });
            renderNotes();
        }

        function renderNotes() {
            const list = document.getElementById('note-list'); list.innerHTML = '';
            (notebookData[currentSubject] || []).forEach((n, i) => {
                const li = document.createElement('li');
                li.className = `note-list-item ${i === currentNoteIdx ? 'active' : ''}`;
                li.innerText = n.title || "Sem título";
                li.onclick = () => { currentNoteIdx = i; loadEditor(); renderNotes(); };
                list.appendChild(li);
            });
            loadEditor();
        }

        function saveData() {
            notebookData[currentSubject][currentNoteIdx].title = document.getElementById('editor-title').value;
            notebookData[currentSubject][currentNoteIdx].body = document.getElementById('editor-body').innerHTML;
            localStorage.setItem('notebook-data-v3', JSON.stringify(notebookData));
            const active = document.querySelector('.note-list-item.active');
            if(active) active.innerText = document.getElementById('editor-title').value || "Sem título";
        }

        function loadEditor() {
            const n = notebookData[currentSubject][currentNoteIdx] || { title: "", body: "" };
            document.getElementById('editor-title').value = n.title;
            document.getElementById('editor-body').innerHTML = n.body;
        }

        function addSubject() {
            const n = prompt("Matéria:");
            if(n) { notebookData[n] = [{title: "Nova Nota", body: ""}]; currentSubject = n; renderSubjects(); }
        }

        function addNote() {
            notebookData[currentSubject].push({title: "Sem título", body: ""});
            currentNoteIdx = notebookData[currentSubject].length -1; renderNotes();
        }

        carregarFontes();
        renderSubjects();
    </script>
</body>
</html>
