<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Cadernos virtuais</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <style>
        @font-face { font-family: 'SimpleHandmade'; src: url('fonts/SimpleHandmade.otf') format('opentype'), url('fonts/SimpleHandmade.ttf') format('truetype'); }
        :root { --bordo-personalidade: #800020; --ouro-destaque: #d4af37; --caixa-fundo: rgba(255, 255, 255, 0.95); --texto-principal: #333; --fundo-celestial: linear-gradient(135deg, #fffdf5 0%, #ffe0b2 25%, #f8bbd0 50%, #f48fb1 75%, #fffdf5 100%); --borda: #e1bee7; --nude-suave: #fffafb; }
        * { box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--fundo-celestial); color: var(--texto-principal); display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; background: var(--caixa-fundo); border-right: 1px solid var(--borda); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; transition: 0.3s; position: relative; z-index: 100; }
        .sidebar h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--bordo-personalidade); text-align: center; margin: 0 0 15px; font-weight: 700; }
        .nav-back { text-decoration: none; color: var(--bordo-personalidade); display: block; text-align: center; margin-bottom: 20px; font-weight: 600; }
        .btn-action { background: var(--bordo-personalidade); color: var(--ouro-destaque); border: none; padding: 10px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; margin-bottom: 10px; }
        
        .shelf-container { flex-grow: 1; padding: 40px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; align-content: start; }
        .notebook-card { width: 180px; height: 240px; background: #eee; border-radius: 10px 20px 20px 10px; cursor: pointer; position: relative; display: flex; flex-direction: column; justify-content: flex-end; border-left: 10px solid rgba(128,0,32,0.1); }
        .notebook-label { background: rgba(255,255,255,0.95); padding: 10px; text-align: center; color: var(--bordo-personalidade); font-family: 'Playfair Display', serif; font-weight: 600; }

        #editor-view { display: none; flex-direction: column; flex-grow: 1; background: var(--caixa-fundo); margin: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(128, 0, 32, 0.05); overflow: hidden; border: 1px solid var(--borda); }
        .toolbar { padding: 10px 20px; border-bottom: 1px solid var(--borda); display: flex; gap: 8px; flex-wrap: wrap; background: var(--nude-suave); }
        .toolbar button { background: white; border: 1px solid var(--borda); border-radius: 5px; padding: 5px 8px; cursor: pointer; }
        .editor-content { flex-grow: 1; padding: 30px; outline: none; line-height: 1.6; font-size: 1.2rem; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h1>Caderno</h1>
        <a href="index.html" class="nav-back">voltar ao planner</a>
        <button class="btn-action" onclick="showShelf()">minha estante</button>
        <div id="notes-index" style="display:none; flex-direction:column; flex-grow:1;">
            <ul id="note-list" style="list-style:none; padding:0; flex-grow:1; overflow-y:auto;"></ul>
            <button class="btn-action" style="background:transparent; color:var(--bordo-personalidade); border:1px dashed var(--bordo-personalidade);" onclick="addNote()">+ nova anotacao</button>
        </div>
    </div>

    <div id="shelf-header" style="flex-grow:1; display:flex; flex-direction:column;">
        <div style="padding: 40px 40px 0 40px; display:flex; justify-content:space-between;">
            <h2 style="font-family:'Playfair Display', serif; color:var(--bordo-personalidade); margin:0;">Meus Cadernos</h2>
            <button id="btn-filter" class="btn-action" style="width:auto;" onclick="toggleNotebookFilter()">Filtrar por Hoje</button>
        </div>
        <div id="shelf-view" class="shelf-container"></div>
    </div>

    <div id="editor-view">
        <input type="text" id="editor-title" style="padding:20px 30px; font-size:2rem; border:none; outline:none;" oninput="saveCurrentData()">
        <div class="toolbar">
            <button onclick="insertTable()">📊 Tabela</button>
            <button onclick="format('bold')">B</button>
            <button onclick="toggleNotebookAI()">✨ Assistente IA</button>
        </div>
        <div id="editor-body" class="editor-content" contenteditable="true" oninput="saveCurrentData()"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBSM8qmzB-c8tzDK3D4F_WlroD49D6oi8g", databaseURL: "https://planner-8eb0a-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        let notebooks = JSON.parse(localStorage.getItem('my-shelf-data')) || {};
        let currentNotebook = null; let currentNoteIdx = 0; let filterToday = true;

        // Função para inserir Tabela
        function insertTable() {
            let rows = prompt("Quantas linhas?"); let cols = prompt("Quantas colunas?");
            if (!rows || !cols) return;
            let table = '<table border="1" style="border-collapse:collapse; width:100%; margin:10px 0;">';
            for (let i = 0; i < rows; i++) {
                table += '<tr>';
                for (let j = 0; j < cols; j++) table += '<td style="padding:8px; border:1px solid #ccc;">&nbsp;</td>';
                table += '</tr>';
            }
            table += '</table>';
            document.execCommand('insertHTML', false, table);
            saveCurrentData();
        }

        function toggleNotebookFilter() {
            filterToday = !filterToday;
            document.getElementById('btn-filter').innerText = filterToday ? 'Filtrar por Hoje' : 'Mostrar Todos';
            renderShelf();
        }

        function getTodaySubjects() {
            const data = JSON.parse(localStorage.getItem('study-data')) || [];
            const colMap = [null, 'seg', 'ter', 'qua', 'qui', 'sex', 'sab'];
            const colKey = colMap[new Date().getDay()];
            let today = [];
            if (colKey) data.forEach(r => { if (r[colKey]) today.push(r[colKey].trim().toLowerCase()); });
            return today;
        }

        function renderShelf() {
            const shelf = document.getElementById('shelf-view'); shelf.innerHTML = '';
            const todaySubjs = getTodaySubjects();
            Object.keys(notebooks).forEach(name => {
                if (filterToday && todaySubjs.length > 0 && !todaySubjs.includes(name.trim().toLowerCase())) return;
                const card = document.createElement('div'); card.className = 'notebook-card';
                card.onclick = () => openNotebook(name);
                card.innerHTML = `<div class="notebook-label">${name}</div>`;
                shelf.appendChild(card);
            });
        }

        function openNotebook(name) {
            currentNotebook = name;
            document.getElementById('shelf-header').style.display = 'none';
            document.getElementById('editor-view').style.display = 'flex';
            document.getElementById('notes-index').style.display = 'flex';
            renderNotesList();
            loadEditor();
        }

        function format(cmd) { document.execCommand(cmd, false, null); saveCurrentData(); }
        function saveCurrentData() {
            if(!currentNotebook) return;
            notebooks[currentNotebook].notes[currentNoteIdx].title = document.getElementById('editor-title').value;
            notebooks[currentNotebook].notes[currentNoteIdx].body = document.getElementById('editor-body').innerHTML;
            localStorage.setItem('my-shelf-data', JSON.stringify(notebooks));
        }

        // IA Simples integrada
        function toggleNotebookAI() { /* Lógica do modal já enviada anteriormente */ alert("Assistente IA Ativo!"); }

        renderShelf();
    </script>
</body>
</html>
