<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Cadernos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        @font-face { font-family: 'Hello'; src: url('fonts/Hello.otf') format('opentype'); }

        :root {
            --rosa-claro: #fff0f5; --rosa-destaque: #ffb6c1; --pink-vibrante: #ff69b4;
            --texto: #444; --borda: #fce4ec;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #fff9fb; color: var(--texto); display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR RETRÁTIL */
        .sidebar { 
            width: 260px; background: white; border-right: 1px solid var(--borda); 
            display: flex; flex-direction: column; padding: 20px; flex-shrink: 0;
            transition: 0.3s; position: relative; z-index: 100;
        }
        .sidebar.closed { margin-left: -260px; }
        
        .toggle-btn {
            position: absolute; right: -40px; top: 20px; background: var(--rosa-destaque);
            border: none; color: white; width: 30px; height: 30px; border-radius: 0 8px 8px 0;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .sidebar h1 { font-family: 'Hello', cursive; font-size: 3rem; color: var(--rosa-destaque); text-align: center; margin: 0 0 20px; font-weight: normal; }
        .nav-back { text-decoration: none; color: var(--rosa-destaque); font-size: 0.8rem; display: block; text-align: center; margin-bottom: 20px; }

        /* ESTANTE DE CADERNOS (TELA INICIAL) */
        .shelf-container { 
            flex-grow: 1; padding: 40px; overflow-y: auto; 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 30px; align-content: start;
        }
        
        .notebook-card {
            width: 180px; height: 240px; background: #eee; border-radius: 10px 20px 20px 10px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s;
            position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end;
            border-left: 10px solid rgba(0,0,0,0.1);
        }
        .notebook-card:hover { transform: translateY(-10px); box-shadow: 8px 8px 25px rgba(255,182,193,0.4); }
        .notebook-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .notebook-label { 
            position: relative; z-index: 2; background: rgba(255,255,255,0.9); 
            padding: 10px; text-align: center; font-weight: 600; font-size: 0.9rem;
            border-top: 1px solid var(--borda);
        }

        /* EDITOR (ESCONDIDO POR PADRÃO) */
        #editor-view { display: none; flex-direction: column; flex-grow: 1; background: white; margin: 15px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); overflow: hidden; }
        .toolbar { padding: 10px; border-bottom: 1px solid var(--borda); display: flex; gap: 8px; background: #fffafb; flex-wrap: wrap; }
        .editor-content { flex-grow: 1; padding: 30px; outline: none; line-height: 1.6; overflow-y: auto; }
        #editor-title { font-family: 'Hello'; font-size: 2.5rem; border: none; outline: none; color: var(--rosa-destaque); padding: 20px 30px 0; width: 100%; }

        /* BOTÃO ADICIONAR */
        .add-notebook-btn {
            width: 180px; height: 240px; border: 3px dashed var(--rosa-destaque);
            border-radius: 10px 20px 20px 10px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; color: var(--rosa-destaque);
            font-weight: 600; transition: 0.3s;
        }
        .add-notebook-btn:hover { background: var(--rosa-claro); }

        .hidden-input { display: none; }
        .btn-action { background: var(--rosa-destaque); color: white; border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-family: inherit; }

        @media (max-width: 600px) {
            .shelf-container { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); padding: 20px; }
            .notebook-card, .add-notebook-btn { width: 140px; height: 190px; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
        <h1>Caderno</h1>
        <a href="index.html" class="nav-back">📅 voltar ao planner</a>
        <button class="btn-action" onclick="showShelf()">📚 ver meus cadernos</button>
        <hr style="width:100%; border:0; border-top:1px solid var(--borda); margin: 20px 0;">
        <div id="notes-list-container">
            <p style="font-size: 0.7rem; color: #999; text-transform: uppercase;">Páginas</p>
            <ul id="note-list" style="list-style:none; padding:0;"></ul>
            <button class="btn-action" style="background:none; color:var(--pink-vibrante); border:1px dashed var(--pink-vibrante); width:100%;" onclick="addNote()">+ nova página</button>
        </div>
    </div>

    <div id="shelf-view" class="shelf-container">
        </div>

    <div id="editor-view">
        <input type="text" id="editor-title" placeholder="Título da nota..." oninput="saveCurrentData()">
        <div class="toolbar">
            <button onclick="document.execCommand('bold')"><b>B</b></button>
            <button onclick="document.execCommand('italic')"><i>I</i></button>
            <button onclick="window.print()">🖨️ PDF</button>
            <button class="btn-action" style="margin-left:auto; background:#888;" onclick="showShelf()">Sair</button>
        </div>
        <div id="editor-body" class="editor-content" contenteditable="true" oninput="saveCurrentData()"></div>
    </div>

    <script>
        // Dados Estruturados
        let notebooks = JSON.parse(localStorage.getItem('my-virtual-notebooks')) || {};
        let currentSubject = null;
        let currentNoteIdx = 0;

        // Alternar Sidebar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('closed');
        }

        // Mostrar Estante
        function showShelf() {
            currentSubject = null;
            document.getElementById('shelf-view').style.display = 'grid';
            document.getElementById('editor-view').style.display = 'none';
            document.getElementById('notes-list-container').style.display = 'none';
            renderShelf();
        }

        // Renderizar Cadernos
        function renderShelf() {
            const shelf = document.getElementById('shelf-view');
            shelf.innerHTML = '';

            Object.keys(notebooks).forEach(subject => {
                const card = document.createElement('div');
                card.className = 'notebook-card';
                if(notebooks[subject].cover) {
                    card.innerHTML = `<img src="${notebooks[subject].cover}">`;
                }
                card.innerHTML += `<div class="notebook-label">${subject}</div>`;
                card.onclick = () => openNotebook(subject);
                shelf.appendChild(card);
            });

            // Botão Adicionar
            const addBtn = document.createElement('div');
            addBtn.className = 'add-notebook-btn';
            addBtn.innerHTML = `<span>+</span><small>Nova Matéria</small>`;
            addBtn.onclick = createNotebook;
            shelf.appendChild(addBtn);
        }

        // Criar Novo Caderno
        function createNotebook() {
            const name = prompt("Qual o nome da matéria?");
            if(!name) return;
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = () => {
                    notebooks[name] = {
                        cover: reader.result,
                        notes: [{ title: "Capa", body: "Comece a escrever..." }]
                    };
                    saveToStorage();
                    renderShelf();
                };
                reader.readAsDataURL(file);
            };
            alert("Agora escolha uma foto para a capa do seu caderno!");
            input.click();
        }

        // Abrir Caderno Específico
        function openNotebook(subject) {
            currentSubject = subject;
            currentNoteIdx = 0;
            document.getElementById('shelf-view').style.display = 'none';
            document.getElementById('editor-view').style.display = 'flex';
            document.getElementById('notes-list-container').style.display = 'block';
            renderNotesList();
            loadEditor();
        }

        function renderNotesList() {
            const list = document.getElementById('note-list');
            list.innerHTML = '';
            notebooks[currentSubject].notes.forEach((n, i) => {
                const li = document.createElement('li');
                li.style.cssText = "padding:10px; cursor:pointer; font-size:0.8rem; border-bottom:1px solid #f0f0f0";
                if(i === currentNoteIdx) li.style.fontWeight = "bold";
                li.innerText = n.title;
                li.onclick = () => { currentNoteIdx = i; loadEditor(); renderNotesList(); };
                list.appendChild(li);
            });
        }

        function loadEditor() {
            const note = notebooks[currentSubject].notes[currentNoteIdx];
            document.getElementById('editor-title').value = note.title;
            document.getElementById('editor-body').innerHTML = note.body;
        }

        function saveCurrentData() {
            if(!currentSubject) return;
            notebooks[currentSubject].notes[currentNoteIdx].title = document.getElementById('editor-title').value;
            notebooks[currentSubject].notes[currentNoteIdx].body = document.getElementById('editor-body').innerHTML;
            saveToStorage();
        }

        function addNote() {
            notebooks[currentSubject].notes.push({ title: "Sem título", body: "" });
            currentNoteIdx = notebooks[currentSubject].notes.length - 1;
            renderNotesList();
            loadEditor();
        }

        function saveToStorage() {
            localStorage.setItem('my-virtual-notebooks', JSON.stringify(notebooks));
        }

        // Início
        showShelf();
    </script>
</body>
</html>
