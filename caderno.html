<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meus Cadernos - Planner 2026</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#fffdf5">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bordo-personalidade: #800020; 
            --ouro-destaque: #d4af37;        
            --caixa-fundo: rgba(255, 255, 255, 0.95); 
            --texto-principal: #333;
            --fundo-celestial: linear-gradient(135deg, #fffdf5 0%, #ffe0b2 25%, #f8bbd0 50%, #f48fb1 75%, #fffdf5 100%); 
            --borda: #e1bee7; 
            --nude-suave: #fffafb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            background: var(--fundo-celestial); 
            color: var(--texto-principal); 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Header do Caderno */
        .header {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--bordo-personalidade);
            font-size: 2.5rem;
            margin: 0;
            letter-spacing: -1px;
        }

        .btn-voltar {
            text-decoration: none;
            background: var(--bordo-personalidade);
            color: var(--ouro-destaque);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(128, 0, 32, 0.2);
        }

        .btn-voltar:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Área de Conteúdo */
        .container {
            width: 90%;
            max-width: 1000px;
            background: var(--caixa-fundo);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(128, 0, 32, 0.1);
            border: 1px solid var(--borda);
            margin-bottom: 50px;
        }

        /* Lista de Cadernos */
        .notebook-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .notebook-card {
            background: #fff;
            border: 1px solid var(--borda);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            border-left: 6px solid var(--bordo-personalidade);
        }

        .notebook-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(128, 0, 32, 0.1);
        }

        .notebook-card h3 {
            font-family: 'Playfair Display', serif;
            color: var(--bordo-personalidade);
            margin: 0 0 10px 0;
            font-size: 1.3rem;
        }

        .notebook-card p {
            font-size: 0.85rem;
            color: #777;
            margin: 0;
            line-height: 1.4;
        }

        /* Editor de Texto Chique */
        #editor-container {
            display: none; /* Aparece ao abrir um caderno */
            flex-direction: column;
            gap: 20px;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--borda);
            padding-bottom: 20px;
            margin-bottom: 10px;
        }

        #note-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--bordo-personalidade);
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-weight: 700;
        }

        #note-body {
            width: 100%;
            min-height: 400px;
            border: none;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--texto-principal);
            outline: none;
            resize: none;
        }

        .editor-footer {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-save {
            background: var(--bordo-personalidade);
            color: var(--ouro-destaque);
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete {
            background: transparent;
            color: #c62828;
            border: 1px solid #c62828;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        .add-notebook-btn {
            background: transparent;
            border: 2px dashed var(--bordo-personalidade);
            color: var(--bordo-personalidade);
            padding: 20px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
        }

        .add-notebook-btn:hover { background: rgba(128, 0, 32, 0.05); }

        /* Ajustes Mobile */
        @media (max-width: 768px) {
            .header { padding: 25px 20px; }
            .header h1 { font-size: 1.8rem; }
            .container { padding: 25px; width: 95%; border-radius: 15px; }
            #note-title { font-size: 1.5rem; }
            #note-body { font-size: 1rem; min-height: 300px; }
            .notebook-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Cadernos</h1>
        <a href="index.html" class="btn-voltar">← Voltar</a>
    </div>

    <div class="container" id="main-container">
        <div id="list-view">
            <div class="notebook-list" id="notebook-list">
                </div>
            <div style="margin-top: 30px; display: flex; flex-direction: column;">
                <button class="add-notebook-btn" onclick="criarNovaNota()">+ Criar Novo Caderno de Resumo</button>
            </div>
        </div>

        <div id="editor-container">
            <div class="editor-header">
                <input type="text" id="note-title" placeholder="Título do Resumo...">
            </div>
            <textarea id="note-body" placeholder="Comece a escrever a sua mágica aqui..."></textarea>
            <div class="editor-footer">
                <button class="btn-delete" onclick="deletarNota()">Excluir</button>
                <button class="btn-save" onclick="salvarNota()">Guardar Alterações</button>
            </div>
        </div>
    </div>

    <script>
        // Configuração do Firebase (Mesma do index.html)
        const firebaseConfig = {
            apiKey: "AIzaSyBSM8qmzB-c8tzDK3D4F_WlroD49D6oi8g",
            authDomain: "planner-8eb0a.firebaseapp.com",
            databaseURL: "https://planner-8eb0a-default-rtdb.firebaseio.com",
            projectId: "planner-8eb0a",
            storageBucket: "planner-8eb0a.firebasestorage.app",
            messagingSenderId: "459926334252",
            appId: "1:459926334252:web:27b700bdb483ed3e7fda89"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let notaAtualId = null;

        // Proteção de Acesso: Só vê o caderno se estiver logado
        auth.onAuthStateChanged((user) => {
            if (user) {
                carregarNotas();
            } else {
                window.location.href = "index.html"; // Manda para o login se não estiver logado
            }
        });

        function carregarNotas() {
            db.ref('meus-cadernos').on('value', (snapshot) => {
                const listDiv = document.getElementById('notebook-list');
                listDiv.innerHTML = '';
                const data = snapshot.val();
                
                if (data) {
                    Object.keys(data).forEach(id => {
                        const nota = data[id];
                        const card = document.createElement('div');
                        card.className = 'notebook-card';
                        card.onclick = () => abrirEditor(id, nota);
                        card.innerHTML = `
                            <h3>${nota.title || 'Sem título'}</h3>
                            <p>${nota.body ? nota.body.substring(0, 80) + '...' : 'Caderno vazio...'}</p>
                        `;
                        listDiv.appendChild(card);
                    });
                }
            });
        }

        function abrirEditor(id, nota) {
            notaAtualId = id;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('editor-container').style.display = 'flex';
            document.getElementById('note-title').value = nota.title || '';
            document.getElementById('note-body').value = nota.body || '';
            window.scrollTo(0, 0);
        }

        function criarNovaNota() {
            const novaNota = {
                title: "Novo Resumo",
                body: ""
            };
            const novoId = db.ref('meus-cadernos').push().key;
            abrirEditor(novoId, novaNota);
        }

        function salvarNota() {
            const title = document.getElementById('note-title').value;
            const body = document.getElementById('note-body').value;
            
            db.ref('meus-cadernos/' + notaAtualId).set({
                title: title,
                body: body
            }).then(() => {
                fecharEditor();
            });
        }

        function deletarNota() {
            if(confirm("Tens a certeza que queres excluir este caderno?")) {
                db.ref('meus-cadernos/' + notaAtualId).remove().then(() => {
                    fecharEditor();
                });
            }
        }

        function fecharEditor() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('editor-container').style.display = 'none';
            notaAtualId = null;
        }
    </script>
</body>
</html>
