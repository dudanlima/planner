<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rosa-claro: #fff0f5;
            --rosa-destaque: #ffb6c1;
            --pink-vibrante: #ff69b4;
            --texto: #555;
            --borda: #fce4ec;
        }

        body { font-family: 'Quicksand', sans-serif; padding: 20px; background-color: #fff9fb; color: var(--texto); }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(255, 182, 193, 0.15); }

        h1 { text-align: center; font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--rosa-destaque); margin-bottom: 20px; }
        h2 { font-size: 1.1rem; color: var(--rosa-destaque); margin-top: 40px; border-left: 4px solid var(--rosa-claro); padding-left: 10px; text-transform: lowercase; }

        /* Calendário */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .cal-btn { background: var(--rosa-claro); border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; color: var(--texto); font-family: inherit; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-name { text-align: center; font-weight: bold; font-size: 0.8rem; background: var(--rosa-claro); padding: 8px; border-radius: 5px; }
        .day-cell { border: 1px solid var(--borda); min-height: 90px; padding: 5px; border-radius: 5px; background: #fff; font-size: 0.7rem; position: relative; }
        
        /* Destaque do dia atual */
        .today-circle { background: var(--pink-vibrante) !important; color: white; border-radius: 50%; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 3px; }
        .day-cell span { font-weight: bold; display: block; margin-bottom: 3px; width: 22px; text-align: center; }
        .day-cell textarea { width: 100%; border: none; height: 60px; resize: none; font-family: inherit; font-size: 0.75rem; outline: none; background: transparent; }

        /* Habit Tracker */
        .tracker-wrapper { overflow-x: auto; margin-top: 15px; border: 1px solid var(--borda); border-radius: 10px; }
        table { border-collapse: collapse; width: 100%; font-size: 0.8rem; }
        th, td { border: 1px solid var(--borda); padding: 5px; text-align: center; }
        .habit-name { text-align: left; min-width: 160px; padding-left: 10px; outline: none; }
        .add-btn { margin-top: 10px; background: none; border: 1px dashed var(--rosa-destaque); color: var(--rosa-destaque); padding: 5px 15px; border-radius: 5px; cursor: pointer; }

        /* Treino */
        .workout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .workout-card { border: 1px solid var(--borda); padding: 12px; border-radius: 12px; background: #fffafb; }
        .workout-card input { width: 100%; border: none; border-bottom: 1px solid var(--rosa-claro); font-weight: bold; margin-bottom: 8px; outline: none; background: transparent; font-family: inherit; color: var(--rosa-destaque); }
        .workout-card textarea { width: 100%; border: none; height: 110px; resize: none; font-family: inherit; outline: none; background: transparent; font-size: 0.8rem; }

        /* Finanças */
        .fin-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .fin-table th { background: var(--rosa-claro); font-size: 0.75rem; padding: 10px; }
        .fin-table input { width: 100%; border: none; padding: 8px; outline: none; text-align: center; font-family: inherit; color: var(--texto); }

        /* Wishlist/Moodboard */
        .extra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .wishlist { border: 1px solid var(--borda); padding: 20px; border-radius: 15px; }
        .moodboard { border: 1px solid var(--borda); padding: 20px; border-radius: 15px; }
        .moodboard-container { width: 100%; min-height: 150px; border: 2px dashed var(--rosa-claro); border-radius: 10px; display: flex; flex-wrap: wrap; gap: 8px; padding: 10px; margin-top: 10px; }
        .mood-img { width: 90px; height: 90px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Planner 2026</h1>

    <div class="cal-header">
        <button class="cal-btn" onclick="moveMonth(-1)">❮ anterior</button>
        <h2 id="month-display" style="margin:0; border:none;">mês</h2>
        <button class="cal-btn" onclick="moveMonth(1)">próximo ❯</button>
    </div>
    <div class="calendar-grid" id="calendar-grid"></div>

    <h2>✨ habit tracker</h2>
    <div class="tracker-wrapper">
        <table>
            <thead><tr id="habit-header"><th>HABIT</th></tr></thead>
            <tbody id="habit-body"></tbody>
        </table>
    </div>
    <button class="add-btn" onclick="addHabitRow()">+ adicionar novo hábito</button>

    <h2>💪 treinos da semana</h2>
    <div class="workout-grid">
        <div class="workout-card"><input placeholder="segunda" data-id="w1"><textarea data-id="wt1" placeholder="treino de hoje..."></textarea></div>
        <div class="workout-card"><input placeholder="terça" data-id="w2"><textarea data-id="wt2" placeholder="treino de hoje..."></textarea></div>
        <div class="workout-card"><input placeholder="quarta" data-id="w3"><textarea data-id="wt3" placeholder="treino de hoje..."></textarea></div>
        <div class="workout-card"><input placeholder="quinta" data-id="w4"><textarea data-id="wt4" placeholder="treino de hoje..."></textarea></div>
        <div class="workout-card"><input placeholder="sexta" data-id="w5"><textarea data-id="wt5" placeholder="treino de hoje..."></textarea></div>
        <div class="workout-card"><input placeholder="sábado" data-id="w6"><textarea data-id="wt6" placeholder="treino de hoje..."></textarea></div>
    </div>

    <h2>💰 controle financeiro</h2>
    <table class="fin-table">
        <thead><tr><th>descrição</th><th>valor</th><th>vencimento</th><th>parcela</th></tr></thead>
        <tbody id="fin-body"></tbody>
    </table>

    <div class="extra-grid">
        <div class="wishlist">
            <h2>🛍️ wishlist</h2>
            <textarea style="width:100%; height:180px; border:none; outline:none; font-family:inherit; font-size:0.9rem;" placeholder="itens desejados..." data-id="wish-list"></textarea>
        </div>
        <div class="moodboard">
            <h2>🖼️ moodboard</h2>
            <div style="display:flex; gap:5px;">
                <input type="text" id="img-url" placeholder="link da imagem..." style="flex:1; border:1px solid var(--borda); border-radius:5px; padding:5px; outline:none;">
                <button class="cal-btn" onclick="addImg()">add</button>
            </div>
            <div class="moodboard-container" id="mood-container"></div>
            <button onclick="localStorage.removeItem('mood-imgs'); renderMood();" style="font-size:10px; background:none; border:none; color:#ccc; cursor:pointer; margin-top:5px;">limpar moodboard</button>
        </div>
    </div>
</div>

<script>
    let currentDate = new Date();
    const realToday = new Date();

    // CALENDÁRIO
    function renderCalendar() {
        const grid = document.getElementById('calendar-grid');
        grid.innerHTML = '';
        const month = currentDate.getMonth();
        const year = currentDate.getFullYear();
        
        document.getElementById('month-display').innerText = `${currentDate.toLocaleString('pt-br', { month: 'long' })} ${year}`;
        
        ['dom','seg','ter','qua','qui','sex','sáb'].forEach(d => {
            let div = document.createElement('div'); div.className = 'day-name'; div.innerText = d; grid.appendChild(div);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for(let i=0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

        for(let d=1; d <= daysInMonth; d++) {
            let cell = document.createElement('div'); cell.className = 'day-cell';
            let key = `cal-${year}-${month}-${d}`;
            
            // Destaque se for o dia de HOJE real
            let daySpanClass = (realToday.getDate() === d && realToday.getMonth() === month && realToday.getFullYear() === year) ? 'today-circle' : '';
            
            cell.innerHTML = `<span class="${daySpanClass}">${d}</span><textarea data-id="${key}">${localStorage.getItem(key) || ''}</textarea>`;
            grid.appendChild(cell);
        }
        setupSync();
    }

    function moveMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }

    // HABIT TRACKER DINÂMICO
    function renderHabits() {
        const hHeader = document.getElementById('habit-header');
        const hBody = document.getElementById('habit-body');
        hHeader.innerHTML = '<th>HABIT</th>';
        for(let i=1; i<=31; i++) hHeader.innerHTML += `<th>${i}</th>`;
        
        hBody.innerHTML = '';
        let habitCount = parseInt(localStorage.getItem('habit-count') || '5');
        for(let i=1; i<=habitCount; i++) {
            let tr = document.createElement('tr');
            let hId = `habit-row-${i}`;
            let savedName = localStorage.getItem(`${hId}-name`) || `Hábito ${i}`;
            let html = `<td class="habit-name" contenteditable="true" data-habit-save="${hId}">${savedName}</td>`;
            for(let d=1; d<=31; d++) {
                let checkId = `${hId}-d${d}`;
                let checked = localStorage.getItem(checkId) === 'true' ? 'checked' : '';
                html += `<td><input type="checkbox" id="${checkId}" ${checked} onclick="localStorage.setItem('${checkId}', this.checked)"></td>`;
            }
            tr.innerHTML = html;
            hBody.appendChild(tr);
        }
        setupHabitNames();
    }

    function addHabitRow() {
        let count = parseInt(localStorage.getItem('habit-count') || '5');
        localStorage.setItem('habit-count', count + 1);
        renderHabits();
    }

    function setupHabitNames() {
        document.querySelectorAll('[data-habit-save]').forEach(cell => {
            cell.onblur = () => localStorage.setItem(`${cell.dataset.habitSave}-name`, cell.innerText);
        });
    }

    // FINANÇAS
    const finBody = document.getElementById('fin-body');
    for(let i=1; i<=8; i++) {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td><input data-id="f-d-${i}"></td><td><input data-id="f-v-${i}"></td><td><input data-id="f-ven-${i}"></td><td><input data-id="f-p-${i}"></td>`;
        finBody.appendChild(tr);
    }

    // SINCRONIZAÇÃO GERAL
    function setupSync() {
        document.querySelectorAll('input, textarea').forEach(el => {
            if(el.dataset.id) {
                el.value = localStorage.getItem(el.dataset.id) || el.value;
                el.oninput = () => localStorage.setItem(el.dataset.id, el.value);
            }
        });
    }

    // MOODBOARD
    function addImg() {
        const url = document.getElementById('img-url').value;
        if(url) {
            let imgs = JSON.parse(localStorage.getItem('mood-imgs') || '[]');
            imgs.push(url);
            localStorage.setItem('mood-imgs', JSON.stringify(imgs));
            renderMood();
            document.getElementById('img-url').value = '';
        }
    }
    function renderMood() {
        const cont = document.getElementById('mood-container');
        cont.innerHTML = '';
        JSON.parse(localStorage.getItem('mood-imgs') || '[]').forEach(url => {
            cont.innerHTML += `<img src="${url}" class="mood-img">`;
        });
    }

    // INIT
    renderCalendar();
    renderHabits();
    renderMood();
    setupSync();
</script>
</body>
</html>
