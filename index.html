<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @font-face { 
            font-family: 'Hello'; 
            src: url('fonts/Hello.otf') format('opentype'); 
        }

        :root {
            --rosa-claro: #fff0f5; --rosa-destaque: #ffb6c1; --pink-vibrante: #ff69b4;
            --azul-agua: #b3e5fc; --azul-deep: #03a9f4; --texto: #444;
            --borda: #fce4ec; --verde-suave: #e8f5e9;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #fff9fb; color: var(--texto); overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--borda); display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .sidebar h1 { font-family: 'Hello', cursive; font-size: 4rem; color: var(--rosa-destaque); text-align: center; margin-bottom: 40px; font-weight: normal; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; transition: 0.3s; }
        .menu-item.active { background: var(--rosa-claro); font-weight: 600; color: var(--pink-vibrante); }
        .sidebar-footer { margin-top: auto; padding-bottom: 20px; }
        .link-caderno { text-decoration: none; color: var(--rosa-destaque); font-size: 1.1rem; display: flex; align-items: center; gap: 12px; padding: 15px; }

        /* MAIN */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; background: white; margin: 20px; border-radius: 30px; box-shadow: 0 10px 40px rgba(255, 182, 193, 0.1); }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2.section-title, #month-display { font-family: 'Hello', sans-serif; color: var(--rosa-destaque); font-size: 2.5rem; font-weight: normal; }

        /* WATER SECTION - CORRIGIDO */
        .water-container { background: #f0faff; padding: 30px; border-radius: 25px; margin-bottom: 30px; text-align: center; }
        .water-title { font-family: 'Hello', cursive; font-size: 3rem; color: var(--azul-deep); margin: 0; }
        .cup-grid { margin: 20px 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .cup { width: 35px; height: 45px; border: 2.5px solid var(--azul-deep); border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; cursor: pointer; background: white; position: relative; transition: 0.3s; }
        .cup.filled { background: var(--azul-agua); }
        .cup.filled::after { content: '💧'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; }

        /* HABIT TRACKER */
        .habit-table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1px solid var(--borda); border-radius: 15px; overflow: hidden; }
        .habit-table th { background: var(--rosa-claro); padding: 12px; color: var(--pink-vibrante); font-size: 0.8rem; }
        .habit-table input[type="text"] { border: none; outline: none; background: transparent; width: 100%; padding: 8px; font-family: inherit; }

        /* TREINOS - REMOVENDO BORDAS PRETAS */
        .stats-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; padding: 30px; border-radius: 25px; background: #fffafb; border: 1px solid var(--borda); text-align: center; }
        .stat-card p { margin-top: 10px; font-size: 2.5rem; font-weight: 600; color: var(--pink-vibrante); }
        .meta-atingida { background: var(--verde-suave) !important; border-color: #81c784 !important; }

        .workout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
        .workout-day { border: 1px solid var(--borda); padding: 20px; border-radius: 20px; background: #fffafb; }
        .workout-day h4 { margin: 0 0 15px; color: var(--rosa-destaque); font-family: 'Poppins'; text-align: center; }
        .workout-day textarea { 
            width: 100%; border: 1px solid var(--borda); border-radius: 8px; 
            height: 80px; resize: none; outline: none; padding: 10px; 
            font-family: inherit; font-size: 0.8rem; background: white;
        }

        /* CALENDÁRIO */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { border: 1px solid var(--borda); min-height: 110px; padding: 10px; border-radius: 15px; background: #fff; position: relative; }
        .day-cell textarea { width: 100%; border: none; outline: none; height: 60px; resize: none; font-size: 0.75rem; background: transparent; }
        .today-circle { background: var(--pink-vibrante); color: white; border-radius: 50%; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }

        .color-menu { position: fixed; background: white; border: 1px solid var(--borda); border-radius: 12px; display: none; z-index: 1000; padding: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .color-option { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; margin: 5px; display: inline-block; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Planner</h1>
        <div class="menu-item active" onclick="showPage('inicio', this)">🏠 início</div>
        <div class="menu-item" onclick="showPage('habitos', this)">✨ hábitos</div>
        <div class="menu-item" onclick="showPage('treinos', this)">💪 treinos</div>
        <div class="menu-item" onclick="showPage('financas', this)">💰 finanças</div>
        <div class="sidebar-footer">
            <a href="caderno.html" class="link-caderno">📖 abrir caderno</a>
        </div>
    </div>

    <div class="main-content">
        <section id="inicio" class="page-section active">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <button onclick="moveMonth(-1)" style="border:none; background:var(--rosa-claro); padding:10px 20px; border-radius:10px; cursor:pointer; color:var(--pink-vibrante); font-weight:600;">❮ anterior</button>
                <h2 id="month-display" style="margin:0;">mês</h2>
                <button onclick="moveMonth(1)" style="border:none; background:var(--rosa-claro); padding:10px 20px; border-radius:10px; cursor:pointer; color:var(--pink-vibrante); font-weight:600;">próximo ❯</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <h2 class="section-title">⏳ contagem regressiva</h2>
            <div id="countdown-area"></div>
        </section>

        <section id="habitos" class="page-section">
            <div class="water-container">
                <p class="water-title">beba água 💧</p>
                <div class="cup-grid" id="water-cups"></div>
                <p id="water-stats" style="color: var(--azul-deep); font-weight: 600;"></p>
            </div>
            <h2 class="section-title">✨ habit tracker</h2>
            <button onclick="addHabitRow()" style="border:none; background:var(--rosa-destaque); color:white; padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:600; margin-bottom:15px;">+ novo hábito</button>
            <div style="overflow-x: auto;">
                <table class="habit-table">
                    <thead><tr id="habit-header"><th>Hábito</th></tr></thead>
                    <tbody id="habit-body"></tbody>
                </table>
            </div>
        </section>

        <section id="treinos" class="page-section">
            <h2 class="section-title">💪 foco no treino</h2>
            <div class="stats-container">
                <div id="card-weekly" class="stat-card"><h3>meta semanal (min 4x)</h3><p id="week-count">0</p></div>
                <div class="stat-card"><h3>total mensal</h3><p id="month-count">0</p></div>
            </div>
            <div id="workout-container" class="workout-grid"></div>
        </section>
    </div>

    <div id="color-picker" class="color-menu">
        <div class="color-option" style="background:#ffffff;" onclick="setDayColor('#ffffff')"></div>
        <div class="color-option" style="background:#c8e6c9;" onclick="setDayColor('#c8e6c9')"></div>
        <div class="color-option" style="background:#bbdefb;" onclick="setDayColor('#bbdefb')"></div>
        <div class="color-option" style="background:#f8bbd0;" onclick="setDayColor('#f8bbd0')"></div>
        <div class="color-option" style="background:#fff9c4;" onclick="setDayColor('#fff9c4')"></div>
    </div>

    <script>
        let currentDate = new Date();
        const realToday = new Date(); realToday.setHours(0,0,0,0);
        let selectedDayKey = null;

        function showPage(id, el) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            if(id === 'treinos') renderWorkouts();
            if(id === 'habitos') renderWater();
        }

        function renderWater() {
            const container = document.getElementById('water-cups');
            const saved = JSON.parse(localStorage.getItem(`water-${realToday.toDateString()}`)) || Array(12).fill(0);
            container.innerHTML = ''; let total = 0;
            saved.forEach((f, i) => {
                let c = document.createElement('div'); c.className = `cup ${f ? 'filled' : ''}`;
                if(f) total += 180;
                c.onclick = () => { saved[i] = saved[i] ? 0 : 1; localStorage.setItem(`water-${realToday.toDateString()}`, JSON.stringify(saved)); renderWater(); };
                container.appendChild(c);
            });
            document.getElementById('water-stats').innerText = `Total: ${total}ml tomados hoje`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            const m = currentDate.getMonth(), y = currentDate.getFullYear();
            document.getElementById('month-display').innerText = `${currentDate.toLocaleString('pt-br', { month: 'long' })} ${y}`;
            ['dom','seg','ter','qua','qui','sex','sáb'].forEach(d => {
                let div = document.createElement('div'); div.style="text-align:center; font-weight:600; font-size:0.75rem; background:var(--rosa-claro); padding:10px; border-radius:8px"; div.innerText = d; grid.appendChild(div);
            });
            const first = new Date(y, m, 1).getDay();
            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=new Date(y, m+1, 0).getDate(); d++) {
                let key = `cal-${y}-${m}-${d}`;
                let cell = document.createElement('div'); cell.className = 'day-cell';
                cell.style.backgroundColor = localStorage.getItem(`color-${key}`) || '#ffffff';
                let isT = (realToday.getDate() === d && realToday.getMonth() === m && realToday.getFullYear() === y);
                cell.innerHTML = `<span class="${isT ? 'today-circle' : ''}">${d}</span><textarea oninput="localStorage.setItem('${key}', this.value); updateCountdowns()">${localStorage.getItem(key)||''}</textarea>`;
                cell.oncontextmenu = (e) => { e.preventDefault(); selectedDayKey = key; const menu = document.getElementById('color-picker'); menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px'; };
                grid.appendChild(cell);
            }
            updateCountdowns();
        }

        function setDayColor(c) { localStorage.setItem(`color-${selectedDayKey}`, c); document.getElementById('color-picker').style.display = 'none'; renderCalendar(); }

        function updateCountdowns() {
            const area = document.getElementById('countdown-area'); area.innerHTML = '';
            const m = currentDate.getMonth(), y = currentDate.getFullYear();
            let events = [];
            for(let d=1; d<=31; d++) {
                let k = `cal-${y}-${m}-${d}`; let t = localStorage.getItem(k);
                if(t && t.trim() !== "") {
                    let evD = new Date(y, m, d); let diff = Math.ceil((evD - realToday) / 86400000);
                    if(diff >= 0) events.push({ days: diff, text: t.split('\n')[0], color: localStorage.getItem(`color-${k}`) || '#fff0f5' });
                }
            }
            events.sort((a,b) => a.days - b.days).forEach(ev => {
                area.innerHTML += `<div style="padding:15px; border-radius:15px; background:${ev.color}; border-left:6px solid var(--pink-vibrante); margin-bottom:10px; font-size:0.85rem"><strong>${ev.days === 0 ? "hoje!" : ev.days + " dias"}</strong>: ${ev.text}</div>`;
            });
        }

        function renderWorkouts() {
            const cont = document.getElementById('workout-container'); cont.innerHTML = '';
            let w = 0, mCount = 0;
            const start = new Date(realToday); start.setDate(realToday.getDate() - realToday.getDay() + (realToday.getDay() === 0 ? -6 : 1));
            for(let d=1; d<=31; d++) if(localStorage.getItem(`w-2026-${realToday.getMonth()}-${d}`) === 'true') mCount++;
            ['segunda','terça','quarta','quinta','sexta','sábado','domingo'].forEach((day, i) => {
                let d = new Date(start); d.setDate(start.getDate() + i);
                let key = `w-2026-${d.getMonth()}-${d.getDate()}`, chk = localStorage.getItem(key) === 'true';
                if(chk) w++;
                cont.innerHTML += `<div class="workout-day"><h4>${day}</h4><textarea onchange="localStorage.setItem('t-${key}', this.value)">${localStorage.getItem('t-'+key)||''}</textarea><br><label style="display:flex; align-items:center; gap:5px; font-size:0.75rem; justify-content:center; cursor:pointer;"><input type="checkbox" ${chk?'checked':''} onclick="toggleW('${key}', this.checked)"> Concluído</label></div>`;
            });
            document.getElementById('week-count').innerText = w > 4 ? 4 : w;
            document.getElementById('month-count').innerText = mCount;
            const card = document.getElementById('card-weekly');
            if(w >= 4) {
                if(!card.classList.contains('meta-atingida')) confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff69b4', '#ffb6c1'] });
                card.classList.add('meta-atingida');
            } else card.classList.remove('meta-atingida');
        }

        function toggleW(k, v) { localStorage.setItem(k, v); renderWorkouts(); }

        function initHabits() {
            const h = document.getElementById('habit-header'); if(h.cells.length < 2) for(let i=1; i<=31; i++) h.innerHTML += `<th>${i}</th>`;
            loadHabits();
        }
        function addHabitRow() {
            const b = document.getElementById('habit-body'); const tr = document.createElement('tr');
            tr.innerHTML = `<td><input type="text" placeholder="Hábito..." onchange="saveHabits()"></td>` + Array(31).fill('<td><input type="checkbox" onchange="saveHabits()"></td>').join('');
            b.appendChild(tr); saveHabits();
        }
        function saveHabits() {
            const data = Array.from(document.querySelectorAll('#habit-body tr')).map(r => ({
                n: r.cells[0].querySelector('input').value,
                c: Array.from(r.querySelectorAll('input[type="checkbox"]')).map(cb => cb.checked)
            }));
            localStorage.setItem('habits-2026', JSON.stringify(data));
        }
        function loadHabits() {
            const data = JSON.parse(localStorage.getItem('habits-2026')) || [];
            const b = document.getElementById('habit-body'); b.innerHTML = '';
            data.forEach(h => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><input type="text" value="${h.n}" onchange="saveHabits()"></td>` + h.c.map(c => `<td><input type="checkbox" ${c?'checked':''} onchange="saveHabits()"></td>`).join('');
                b.appendChild(tr);
            });
        }

        function moveMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        window.onclick = () => document.getElementById('color-picker').style.display = 'none';

        renderCalendar(); initHabits();
    </script>
</body>
</html>
