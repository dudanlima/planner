<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rosa-claro: #fff0f5;
            --rosa-destaque: #ffb6c1;
            --pink-vibrante: #ff69b4;
            --azul-agua: #b3e5fc;
            --azul-deep: #03a9f4;
            --texto: #444;
            --borda: #fce4ec;
            --verde-suave: #e8f5e9;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #fff9fb; color: var(--texto); overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--borda); display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .sidebar h1 { font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: var(--rosa-destaque); text-align: center; margin-bottom: 30px; margin-top: 0; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; font-weight: 500; border: 1px solid transparent; }
        .menu-item:hover { background: var(--rosa-claro); }
        .menu-item.active { background: var(--rosa-claro); border-color: var(--rosa-destaque); font-weight: 600; color: var(--pink-vibrante); }
        .sidebar-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--borda); text-align: center; }
        .link-caderno { text-decoration: none; color: var(--rosa-destaque); font-size: 0.75rem; font-weight: 600; }

        /* CONTEÚDO */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; background: white; margin: 20px; border-radius: 30px; box-shadow: 0 10px 40px rgba(255, 182, 193, 0.1); }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2.section-title { color: var(--rosa-destaque); font-weight: 600; font-size: 1.4rem; border-left: 4px solid var(--rosa-claro); padding-left: 10px; text-transform: lowercase; margin-top: 40px; }

        /* CALENDÁRIO */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-btn { background: var(--rosa-claro); border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.8rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-name { text-align: center; font-weight: 600; font-size: 0.75rem; background: var(--rosa-claro); padding: 10px; border-radius: 8px; text-transform: uppercase; }
        .day-cell { border: 1px solid var(--borda); min-height: 110px; padding: 8px; border-radius: 10px; background: #fff; position: relative; }
        .day-cell textarea { width: 100%; border: none; height: 65px; resize: none; font-family: 'Poppins', sans-serif; font-size: 0.75rem; outline: none; background: transparent; }
        .today-circle { background: var(--pink-vibrante); color: white; border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 5px; font-weight: 600; }

        /* TREINOS */
        .stats-container { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 200px; padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--borda); }
        .stat-card.goal-met { background: var(--verde-suave); border-color: #a5d6a7; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 600; color: var(--pink-vibrante); }
        .workout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        .workout-day { border: 1px solid var(--borda); padding: 15px; border-radius: 15px; background: #fffafb; text-align: center; }
        .workout-day input[type="text"] { width: 100%; border: none; border-bottom: 1px solid var(--rosa-claro); background: transparent; outline: none; font-family: 'Poppins', sans-serif; text-align: center; font-size: 0.8rem; margin-bottom: 10px; }
        .check-workout { transform: scale(1.3); accent-color: var(--pink-vibrante); cursor: pointer; }

        /* WATER & HABITS */
        .water-container { background: #f0faff; padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #e1f5fe; text-align: center; }
        .water-title { font-family: 'Dancing Script', cursive; font-size: 2rem; color: var(--azul-deep); margin-bottom: 10px; }
        .cup { width: 30px; height: 40px; border: 2.5px solid var(--azul-deep); border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; cursor: pointer; display: inline-block; margin: 5px; position: relative; background: white; }
        .cup.filled { background: var(--azul-agua); }
        .cup.filled::after { content: '💧'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10px; }
        .habit-table-container { overflow-x: auto; background: white; border-radius: 15px; border: 1px solid var(--borda); margin-top: 15px; }
        .habit-table { border-collapse: collapse; width: 100%; font-size: 0.75rem; }
        .habit-table th, .habit-table td { border: 1px solid var(--borda); padding: 8px; text-align: center; }
        .habit-table th { background: var(--rosa-claro); color: var(--pink-vibrante); }

        /* UTILS */
        .color-menu { position: fixed; background: white; border: 1px solid var(--borda); border-radius: 10px; display: none; z-index: 1000; padding: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .color-option { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; margin: 5px; display: inline-block; border: 1px solid rgba(0,0,0,0.05); }
        .countdown-bar { padding: 12px 20px; border-radius: 15px; font-size: 0.8rem; display: flex; justify-content: space-between; border-left: 6px solid var(--pink-vibrante); margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Planner</h1>
        <div class="menu-item active" onclick="showPage('inicio', this)">🏠 início</div>
        <div class="menu-item" onclick="showPage('habitos', this)">✨ hábitos</div>
        <div class="menu-item" onclick="showPage('treinos', this)">💪 treinos</div>
        <div class="menu-item" onclick="showPage('financas', this)">💰 finanças</div>
        <div class="menu-item" onclick="showPage('extras', this)">🖼️ extras</div>
        <div class="sidebar-footer"><a href="caderno.html" class="link-caderno">📖 abrir caderno virtual</a></div>
    </div>

    <div class="main-content">
        <section id="inicio" class="page-section active">
            <div class="cal-header">
                <button class="cal-btn" onclick="moveMonth(-1)">❮ anterior</button>
                <h2 id="month-display" style="margin:0; text-transform: lowercase; color: var(--rosa-destaque); font-weight: 600;">mês</h2>
                <button class="cal-btn" onclick="moveMonth(1)">próximo ❯</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <h2 class="section-title">⏳ contagem regressiva</h2>
            <div id="countdown-area"></div>
        </section>

        <section id="habitos" class="page-section">
            <div class="water-container">
                <p class="water-title">beba água 💧</p>
                <div id="water-cups"></div>
                <p id="water-stats" style="font-size: 0.85rem; color: var(--azul-deep); margin-top: 10px; font-weight: 600;"></p>
            </div>
            <h2 class="section-title">✨ habit tracker</h2>
            <button class="cal-btn" style="background:var(--rosa-destaque); color:white; margin-bottom:15px;" onclick="addHabitRow()">+ novo hábito</button>
            <div class="habit-table-container">
                <table class="habit-table">
                    <thead><tr id="habit-days-header"><th>Hábito</th></tr></thead>
                    <tbody id="habit-body"></tbody>
                </table>
            </div>
        </section>

        <section id="treinos" class="page-section">
            <h2 class="section-title">💪 foco no treino</h2>
            <div class="stats-container">
                <div id="card-weekly" class="stat-card">
                    <h3>meta semanal (min 4x)</h3>
                    <p id="week-count">0 / 4</p>
                </div>
                <div class="stat-card">
                    <h3>total de treinos no mês</h3>
                    <p id="month-count">0</p>
                </div>
            </div>
            <div class="workout-grid" id="workout-days-container"></div>
        </section>

        <section id="financas" class="page-section"><h2>💰 finanças</h2></section>
        <section id="extras" class="page-section"><h2>🖼️ extras</h2></section>
    </div>

    <div id="color-picker" class="color-menu">
        <div class="color-option" style="background:#ffffff;" onclick="setDayColor('#ffffff')"></div>
        <div class="color-option" style="background:#c8e6c9;" onclick="setDayColor('#c8e6c9')"></div>
        <div class="color-option" style="background:#bbdefb;" onclick="setDayColor('#bbdefb')"></div>
        <div class="color-option" style="background:#fff9c4;" onclick="setDayColor('#fff9c4')"></div>
        <div class="color-option" style="background:#ffccbc;" onclick="setDayColor('#ffccbc')"></div>
        <div class="color-option" style="background:#f8bbd0;" onclick="setDayColor('#f8bbd0')"></div>
    </div>

    <script>
        let currentDate = new Date();
        const realToday = new Date();
        realToday.setHours(0,0,0,0);
        let selectedDayKey = null;

        function showPage(pageId, element) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            if(pageId === 'treinos') renderWorkouts();
        }

        // --- CALENDÁRIO ---
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const month = currentDate.getMonth();
            const year = currentDate.getFullYear();
            document.getElementById('month-display').innerText = `${currentDate.toLocaleString('pt-br', { month: 'long' })} ${year}`;

            ['dom','seg','ter','qua','qui','sex','sáb'].forEach(d => {
                let div = document.createElement('div'); div.className = 'day-name'; div.innerText = d; grid.appendChild(div);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let i=0; i < firstDay; i++) grid.appendChild(document.createElement('div'));

            for(let d=1; d <= daysInMonth; d++) {
                let cell = document.createElement('div');
                cell.className = 'day-cell';
                let key = `cal-${year}-${month}-${d}`;
                cell.style.backgroundColor = localStorage.getItem(`color-${key}`) || '#ffffff';
                let isToday = (realToday.getDate() === d && realToday.getMonth() === month && realToday.getFullYear() === year);
                cell.innerHTML = `<span class="${isToday ? 'today-circle' : ''}">${d}</span><textarea oninput="saveText('${key}', this.value)">${localStorage.getItem(key) || ''}</textarea>`;
                cell.oncontextmenu = (e) => {
                    e.preventDefault(); selectedDayKey = key;
                    const menu = document.getElementById('color-picker');
                    menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
                };
                grid.appendChild(cell);
            }
            updateCountdowns();
        }

        function saveText(key, val) { localStorage.setItem(key, val); updateCountdowns(); }
        function setDayColor(color) { localStorage.setItem(`color-${selectedDayKey}`, color); document.getElementById('color-picker').style.display = 'none'; renderCalendar(); }

        function updateCountdowns() {
            const area = document.getElementById('countdown-area'); area.innerHTML = '';
            const month = currentDate.getMonth(); const year = currentDate.getFullYear();
            let events = [];
            for(let d=1; d <= 31; d++) {
                let k = `cal-${year}-${month}-${d}`;
                let text = localStorage.getItem(k);
                if(text && text.trim() !== "") {
                    let evDate = new Date(year, month, d);
                    let diff = Math.ceil((evDate - realToday) / (1000 * 60 * 60 * 24));
                    if(diff >= 0) events.push({ days: diff, text: text.split('\n')[0], date: d, color: localStorage.getItem(`color-${k}`) || '#fff0f5' });
                }
            }
            events.sort((a,b) => a.days - b.days).forEach(ev => {
                let label = ev.days === 0 ? "hoje!" : (ev.days === 1 ? "amanhã" : `${ev.days} dias`);
                area.innerHTML += `<div class="countdown-bar" style="background: ${ev.color};"><span><strong>${label}</strong>: ${ev.text}</span><small>dia ${ev.date}</small></div>`;
            });
        }

        // --- WATER ---
        function renderWater() {
            const container = document.getElementById('water-cups');
            const stats = document.getElementById('water-stats');
            container.innerHTML = '';
            const todayStr = realToday.toDateString();
            const savedWater = JSON.parse(localStorage.getItem(`water-${todayStr}`)) || Array(12).fill(0);
            let total = 0;
            savedWater.forEach((filled, i) => {
                let cup = document.createElement('div'); cup.className = `cup ${filled ? 'filled' : ''}`;
                if(filled) total += 180;
                cup.onclick = () => { savedWater[i] = savedWater[i] ? 0 : 1; localStorage.setItem(`water-${todayStr}`, JSON.stringify(savedWater)); renderWater(); };
                container.appendChild(cup);
            });
            stats.innerText = `total: ${total}ml tomados`;
        }

        // --- HABITS ---
        function initHabitTracker() {
            const h = document.getElementById('habit-days-header');
            if(h.cells.length <= 1) { for(let i=1; i<=31; i++) { let th = document.createElement('th'); th.innerText = i; h.appendChild(th); } }
            loadHabits();
        }
        function addHabitRow(n = "") {
            const b = document.getElementById('habit-body');
            const tr = document.createElement('tr');
            let html = `<td><input type="text" class="habit-input" placeholder="Novo hábito..." value="${n}" onchange="saveHabits()"></td>`;
            for(let i=1; i<=31; i++) html += `<td><input type="checkbox" class="check-habit" onchange="saveHabits()"></td>`;
            tr.innerHTML = html; b.appendChild(tr); saveHabits();
        }
        function saveHabits() {
            const data = Array.from(document.querySelectorAll('#habit-body tr')).map(row => ({
                name: row.querySelector('.habit-input').value,
                checks: Array.from(row.querySelectorAll('.check-habit')).map(cb => cb.checked)
            }));
            localStorage.setItem('habits-2026', JSON.stringify(data));
        }
        function loadHabits() {
            const data = JSON.parse(localStorage.getItem('habits-2026')) || [];
            const b = document.getElementById('habit-body'); b.innerHTML = '';
            if(data.length === 0) addHabitRow("Focar no TCC");
            else data.forEach(h => {
                const tr = document.createElement('tr');
                let html = `<td><input type="text" class="habit-input" value="${h.name}" onchange="saveHabits()"></td>`;
                h.checks.forEach(c => html += `<td><input type="checkbox" class="check-habit" ${c ? 'checked' : ''} onchange="saveHabits()"></td>`);
                tr.innerHTML = html; b.appendChild(tr);
            });
        }

        // --- TREINOS (CORRIGIDO) ---
        function renderWorkouts() {
            const container = document.getElementById('workout-days-container');
            container.innerHTML = '';
            const days = ['segunda', 'terça', 'quarta', 'quinta', 'sexta', 'sábado', 'domingo'];
            const now = new Date();
            const month = now.getMonth();
            const year = now.getFullYear();

            // Encontrar o início da semana atual (domingo)
            let startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay());

            let weeklyCount = 0;
            let monthlyCount = 0;

            // Contador Mensal: percorre todos os dias do mês no localStorage
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for(let d=1; d <= daysInMonth; d++) {
                if(localStorage.getItem(`workout-log-${year}-${month}-${d}`) === 'true') monthlyCount++;
            }

            days.forEach((day, index) => {
                const div = document.createElement('div');
                div.className = 'workout-day';
                
                // Calcula a data exata deste dia da semana na semana atual
                let dayDate = new Date(startOfWeek);
                dayDate.setDate(startOfWeek.getDate() + index);
                
                const dKey = `workout-log-${dayDate.getFullYear()}-${dayDate.getMonth()}-${dayDate.getDate()}`;
                const textKey = `workout-text-${dKey}`;
                const isChecked = localStorage.getItem(dKey) === 'true';

                if(isChecked) weeklyCount++;

                div.innerHTML = `
                    <h4>${day}</h4>
                    <input type="text" placeholder="o que treinar?" value="${localStorage.getItem(textKey) || ''}" 
                        onchange="localStorage.setItem('${textKey}', this.value)">
                    <br>
                    <input type="checkbox" class="check-workout" ${isChecked ? 'checked' : ''} 
                        onclick="toggleWorkoutLog('${dKey}', this.checked)">
                `;
                container.appendChild(div);
            });

            document.getElementById('week-count').innerText = `${weeklyCount} / 4`;
            document.getElementById('month-count').innerText = monthlyCount;
            const card = document.getElementById('card-weekly');
            if(weeklyCount >= 4) card.classList.add('goal-met');
            else card.classList.remove('goal-met');
        }

        function toggleWorkoutLog(key, checked) {
            localStorage.setItem(key, checked);
            renderWorkouts();
        }

        function moveMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        window.onclick = () => document.getElementById('color-picker').style.display = 'none';

        renderCalendar(); initHabitTracker(); renderWater(); renderWorkouts();
    </script>
</body>
</html>
