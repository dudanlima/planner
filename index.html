<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        @font-face { 
            font-family: 'SimpleHandmade'; 
            src: url('fonts/SimpleHandmade.otf') format('opentype'), url('fonts/SimpleHandmade.ttf') format('truetype'); 
        }
        
        :root {
            --rosa-claro: #fff0f5; --rosa-destaque: #ffb6c1; --pink-vibrante: #ff69b4;
            --azul-agua: #b3e5fc; --azul-deep: #03a9f4; --texto: #444;
            --borda: #fce4ec; --verde-suave: #e8f5e9; --vermelho-suave: #ffebee;
            --yellow-postit: #fffacd;
        }

        * { box-sizing: border-box; }
        body { font-family: 'SimpleHandmade', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #fff9fb; color: var(--texto); overflow: hidden; }

        .sidebar { 
            width: 260px; background: white; border-right: 1px solid var(--borda); 
            display: flex; flex-direction: column; padding: 25px; flex-shrink: 0;
            transition: 0.3s; position: relative; z-index: 100;
        }
        .sidebar.closed { margin-left: -260px; }
        
        .toggle-btn {
            position: absolute; right: -40px; top: 20px; background: var(--rosa-destaque);
            border: none; color: white; width: 30px; height: 30px; border-radius: 0 8px 8px 0;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .sidebar h1 { font-family: 'SimpleHandmade', cursive; font-size: 3rem; color: var(--rosa-destaque); text-align: center; margin-bottom: 40px; margin-top: 0; font-weight: normal; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; transition: 0.3s; }
        .menu-item.active { background: var(--rosa-claro); font-weight: 600; color: var(--pink-vibrante); }
        .sidebar-footer { margin-top: auto; padding-bottom: 20px; }
        .link-caderno { text-decoration: none; color: var(--rosa-destaque); font-size: 1.1rem; display: flex; align-items: center; gap: 12px; padding: 15px; }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; background: white; margin: 20px; border-radius: 30px; box-shadow: 0 10px 40px rgba(255, 182, 193, 0.1); }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2.section-title, #month-display, #wishlist-title { font-family: 'SimpleHandmade', sans-serif; color: var(--rosa-destaque); font-size: 2rem; font-weight: normal; }
        h2.section-title { border-left: 4px solid var(--rosa-claro); padding-left: 15px; margin-top: 40px; }
        #wishlist-title { text-align: center; margin-bottom: 30px; }

        .cal-btn { border: none; outline: none; background: var(--rosa-claro); color: var(--pink-vibrante); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-family: 'SimpleHandmade', sans-serif; font-weight: 600; }

        .todo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .todo-block { background: var(--rosa-destaque); color: white; border-radius: 0; padding: 20px; min-height: 300px; box-shadow: 5px 5px 15px rgba(255, 182, 193, 0.4); position: relative; }
        .todo-block::after { content: ''; position: absolute; bottom: 0; right: 0; width: 0; height: 0; border-style: solid; border-width: 0 0 25px 25px; border-color: transparent transparent #fff9fb #fff9fb; border-radius: 20px 0 0 0; }
        .todo-date-header { font-weight: 600; color: white; border-bottom: 2px dashed rgba(255, 255, 255, 0.5); padding-bottom: 10px; margin-bottom: 15px; font-size: 0.9rem; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .todo-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; background: rgba(255, 255, 255, 0.2); padding: 10px; border-radius: 12px; }
        .todo-item input[type="checkbox"] { accent-color: white; width: 18px; height: 18px; cursor: pointer; mix-blend-mode: screen; }
        .todo-item input[type="text"] { border: none; outline: none; flex-grow: 1; font-family: inherit; font-size: 0.85rem; background: transparent; color: white; }
        .todo-item input[type="text"]::placeholder { color: rgba(255, 255, 255, 0.7); }
        .todo-item input[type="text"].completed { text-decoration: line-through; color: rgba(255, 255, 255, 0.5); text-decoration-color: white; }
        .add-todo-btn { width: 100%; padding: 10px; border: 1px dashed white; background: transparent; color: white; border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 0.8rem; transition: 0.3s; margin-top: 10px; }
        .add-todo-btn:hover { background: rgba(255, 255, 255, 0.2); }

        .wishlist-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        .small-blocks-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .wishlist-postit { box-shadow: 5px 5px 15px rgba(0,0,0,0.1); border-radius: 20px; position: relative; padding: 20px; color: white; display: flex; flex-direction: column; }
        
        .wishlist-block-header { font-weight: 600; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; color: inherit; opacity: 0.7; text-align: center; margin-bottom: 15px; border-bottom: 1px dashed rgba(255, 255, 255, 0.3); padding-bottom: 10px; }

        .wishlist-item { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; background: rgba(255,255,255,0.15); padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .wishlist-item input[type="checkbox"] { accent-color: white; width: 16px; height: 16px; cursor: pointer; mix-blend-mode: screen; }
        .wishlist-item input[type="text"] { border: none; outline: none; flex-grow: 1; font-family: inherit; font-size: 0.85rem; background: transparent; color: white; }
        .wishlist-item input[type="text"]::placeholder { color: rgba(255,255,255,0.5); }
        .wishlist-item input[type="text"].completed { text-decoration: line-through; color: rgba(255,255,255,0.4); text-decoration-color: white; }
        
        .apartamento-block { background: var(--rosa-destaque); width: 100%; min-height: 200px; }
        .quero-block { background: var(--yellow-postit); color: #666; min-height: 180px; }
        .preciso-block { background: var(--verde-suave); color: #2e7d32; min-height: 180px; }
        .necessidade-block { background: var(--vermelho-suave); color: #c62828; min-height: 180px; }

        .quero-block input[type="checkbox"], .preciso-block input[type="checkbox"], .necessidade-block input[type="checkbox"] { accent-color: currentColor; mix-blend-mode: multiply; }
        .quero-block input[type="text"], .preciso-block input[type="text"], .necessidade-block input[type="text"] { color: currentColor; }
        .quero-block input[type="text"]::placeholder { color: #aaa; }
        .preciso-block input[type="text"]::placeholder { color: #888; }
        .necessidade-block input[type="text"]::placeholder { color: #cc8888; }
        .quero-block .wishlist-block-header, .preciso-block .wishlist-block-header, .necessidade-block .wishlist-block-header { border-bottom-color: rgba(100, 100, 100, 0.3); opacity: 0.8; }
        
        .quero-block .wishlist-item { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.05); }
        .preciso-block .wishlist-item, .necessidade-block .wishlist-item { background: rgba(255,255,255,0.4); border-color: rgba(255,255,255,0.5); }

        .water-container { background: #f0faff; padding: 30px; border-radius: 25px; margin-bottom: 30px; text-align: center; }
        .cup-grid { margin: 20px 0; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .cup { width: 35px; height: 45px; border: 2.5px solid var(--azul-deep); border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; cursor: pointer; background: white; position: relative; }
        .cup.filled { background: var(--azul-agua); }

        .study-table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1px solid var(--borda); border-radius: 15px; overflow: hidden; }
        .study-table th { background: var(--rosa-claro); padding: 12px; color: var(--pink-vibrante); font-size: 0.8rem; }
        .study-table td { padding: 0; }
        .study-table input[type="text"] { border: none !important; outline: none !important; box-shadow: none !important; background: transparent; width: 100%; padding: 12px; font-family: inherit; }

        .habit-table { width: 100%; border-collapse: collapse; margin-top: 15px; border: 1px solid var(--borda); border-radius: 15px; overflow: hidden; }
        .habit-table th { background: var(--rosa-claro); padding: 12px; color: var(--pink-vibrante); font-size: 0.8rem; min-width: 35px; }
        .habit-table input[type="text"] { border: none !important; outline: none !important; box-shadow: none !important; background: transparent; width: 100%; padding: 8px; font-family: inherit; }

        .stats-container { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; padding: 30px; border-radius: 25px; background: #fffafb; border: 1px solid var(--borda); text-align: center; }
        .stat-card p { margin-top: 10px; font-size: 2.5rem; font-weight: 600; color: var(--pink-vibrante); }
        .meta-atingida { background: var(--verde-suave) !important; border-color: #81c784 !important; }
        
        .workout-day { border: 1px solid var(--borda); padding: 20px; border-radius: 20px; background: #fffafb; display: flex; flex-direction: column; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { border: 1px solid var(--borda); min-height: 110px; padding: 10px; border-radius: 15px; background: #fff; position: relative; }
        .day-cell textarea { width: 100%; border: none !important; outline: none !important; height: 60px; resize: none; font-size: 0.75rem; background: transparent; font-family: inherit; }
        .today-circle { background: var(--pink-vibrante); color: white; border-radius: 50%; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; }
        
        .color-menu { position: fixed; background: white; border: 1px solid var(--borda); border-radius: 12px; display: none; z-index: 1000; padding: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 160px; }
        .color-option { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; margin: 5px; display: inline-block; border: 1px solid #eee; }

        /* ESTILOS DOS POST-ITS DE ESTUDO E IA */
        .subject-postit {
            background: #fffdf8; border: 1px solid var(--rosa-destaque);
            border-radius: 15px; padding: 20px; box-shadow: 5px 5px 15px rgba(255, 182, 193, 0.15);
            display: flex; flex-direction: column; gap: 15px;
        }
