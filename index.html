<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @font-face { 
            font-family: 'Hello'; 
            src: url('fonts/Hello.otf') format('opentype'); 
            font-weight: normal; 
            font-style: normal; 
        }

        :root {
            --rosa-claro: #fff0f5; --rosa-destaque: #ffb6c1; --pink-vibrante: #ff69b4;
            --texto: #444; --borda: #fce4ec; --verde-suave: #e8f5e9; --vermelho-suave: #ffebee;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #fff9fb; color: var(--texto); overflow: hidden; }

        .sidebar { width: 260px; background: white; border-right: 1px solid var(--borda); display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .sidebar h1 { font-family: 'Hello', cursive; font-size: 3.5rem; color: var(--rosa-destaque); text-align: center; margin-bottom: 30px; margin-top: 0; font-weight: normal; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; font-weight: 500; }
        .menu-item.active { background: var(--rosa-claro); border-color: var(--rosa-destaque); font-weight: 600; color: var(--pink-vibrante); }
        .sidebar-footer { margin-top: auto; padding-top: 20px; text-align: center; border-top: 1px solid var(--borda); }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; background: white; margin: 20px; border-radius: 30px; box-shadow: 0 10px 40px rgba(255, 182, 193, 0.1); }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2.section-title, #month-display { font-family: 'Hello', sans-serif; color: var(--rosa-destaque); font-weight: normal; font-size: 2.2rem; text-transform: lowercase; }

        .cal-btn { border: none; outline: none; background: var(--rosa-claro); color: var(--pink-vibrante); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        /* TREINOS (QUADRADOS) */
        .stats-container { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-card { flex: 1; padding: 20px; border-radius: 20px; background: #fffafb; border: 1px solid var(--borda); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.8rem; font-weight: 500; }
        .stat-card p { margin: 5px 0 0; font-size: 1.8rem; font-weight: 600; color: var(--pink-vibrante); }
        .meta-atingida { background: var(--verde-suave) !important; border-color: #2e7d32 !important; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { border: 1px solid var(--borda); min-height: 110px; padding: 8px; border-radius: 10px; background: #fff; }
        .day-cell textarea { width: 100%; border: none; height: 65px; resize: none; font-size: 0.75rem; outline: none; background: transparent; }

        .workout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .workout-day { border: 1px solid var(--borda); padding: 15px; border-radius: 15px; background: #fffafb; }
        .workout-day textarea { width: 100%; border: none; height: 80px; resize: none; font-size: 0.8rem; outline: none; background: transparent; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Planner</h1>
        <div class="menu-item active" onclick="showPage('inicio', this)">🏠 início</div>
        <div class="menu-item" onclick="showPage('habitos', this)">✨ hábitos</div>
        <div class="menu-item" onclick="showPage('treinos', this)">💪 treinos</div>
        <div class="sidebar-footer"><a href="caderno.html" style="text-decoration:none; color:var(--rosa-destaque); font-size:0.8rem;">📖 abrir caderno</a></div>
    </div>

    <div class="main-content">
        <section id="inicio" class="page-section active">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="cal-btn" onclick="moveMonth(-1)">❮ anterior</button>
                <h2 id="month-display" style="margin:0;">mês</h2>
                <button class="cal-btn" onclick="moveMonth(1)">próximo ❯</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </section>

        <section id="treinos" class="page-section">
            <h2 class="section-title">💪 foco no treino</h2>
            <div class="stats-container">
                <div id="card-weekly" class="stat-card">
                    <h3>meta semanal (min 4x)</h3>
                    <p id="week-count">0</p>
                </div>
                <div class="stat-card">
                    <h3>total de treinos no mês</h3>
                    <p id="month-count">0</p>
                </div>
            </div>
            <div class="workout-grid" id="workout-days-container"></div>
        </section>
    </div>

    <script>
        let currentDate = new Date();
        const realToday = new Date();
        realToday.setHours(0,0,0,0);

        function showPage(pageId, element) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            element.classList.add('active');
            if(pageId === 'treinos') renderWorkouts();
        }

        // FOGOS DE ARTIFÍCIO
        function dispararFogos() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff69b4', '#ffb6c1'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff69b4', '#ffb6c1'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            const m = currentDate.getMonth(); const y = currentDate.getFullYear();
            document.getElementById('month-display').innerText = `${currentDate.toLocaleString('pt-br', { month: 'long' })} ${y}`;
            ['dom','seg','ter','qua','qui','sex','sáb'].forEach(d => {
                let div = document.createElement('div'); div.style="text-align:center; font-weight:600; font-size:0.7rem; background:var(--rosa-claro); padding:8px; border-radius:5px"; div.innerText = d; grid.appendChild(div);
            });
            const first = new Date(y, m, 1).getDay();
            for(let i=0; i < first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d <= new Date(y, m+1, 0).getDate(); d++) {
                let cell = document.createElement('div'); cell.className = 'day-cell';
                let key = `cal-${y}-${m}-${d}`;
                cell.innerHTML = `<span>${d}</span><textarea oninput="localStorage.setItem('${key}', this.value)">${localStorage.getItem(key) || ''}</textarea>`;
                grid.appendChild(cell);
            }
        }

        function renderWorkouts() {
            const container = document.getElementById('workout-days-container'); container.innerHTML = '';
            const days = ['segunda', 'terça', 'quarta', 'quinta', 'sexta', 'sábado', 'domingo'];
            const now = new Date(); let start = new Date(now); 
            start.setDate(now.getDate() - now.getDay() + (now.getDay() === 0 ? -6 : 1));
            
            let w = 0; let m = 0;
            for(let d=1; d <= 31; d++) { if(localStorage.getItem(`workout-2026-${now.getMonth()}-${d}`) === 'true') m++; }

            days.forEach((day, i) => {
                let dDate = new Date(start); dDate.setDate(start.getDate() + i);
                let k = `workout-2026-${dDate.getMonth()}-${dDate.getDate()}`;
                let chk = localStorage.getItem(k) === 'true'; if(chk) w++;
                const div = document.createElement('div'); div.className = 'workout-day';
                div.innerHTML = `<h4>${day}</h4>
                    <textarea onchange="localStorage.setItem('text-'+k, this.value)">${localStorage.getItem('text-'+k)||''}</textarea>
                    <label style="font-size:0.7rem"><input type="checkbox" ${chk?'checked':''} onclick="toggleWorkout('${k}', this.checked)"> Concluído</label>`;
                container.appendChild(div);
            });

            // Lógica de limite 4 e fogos
            const finalW = w > 4 ? 4 : w;
            document.getElementById('week-count').innerText = finalW;
            document.getElementById('month-count').innerText = m;
            
            const card = document.getElementById('card-weekly');
            if(w >= 4) {
                if(!card.classList.contains('meta-atingida')) dispararFogos();
                card.classList.add('meta-atingida');
            } else {
                card.classList.remove('meta-atingida');
            }
        }

        function toggleWorkout(key, val) {
            localStorage.setItem(key, val);
            renderWorkouts();
        }

        function moveMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        renderCalendar(); renderWorkouts();
    </script>
</body>
</html>
