<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'Hello'; src: url('fonts/Hello.otf') format('opentype'); }
        :root {
            --rosa-claro: #fff0f5; --rosa-destaque: #ffb6c1; --pink-vibrante: #ff69b4;
            --texto: #444; --borda: #fce4ec; --verde-suave: #e8f5e9;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #fff9fb; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 260px; background: white; border-right: 1px solid var(--borda); display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .sidebar h1 { font-family: 'Hello', cursive; font-size: 3.5rem; color: var(--rosa-destaque); text-align: center; margin-bottom: 20px; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; display: flex; align-items: center; gap: 12px; }
        .menu-item.active { background: var(--rosa-claro); color: var(--pink-vibrante); font-weight: 600; }

        /* CONTEÚDO */
        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; background: white; margin: 20px; border-radius: 30px; box-shadow: 0 10px 40px rgba(255,182,193,0.1); }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        h2.section-title, #month-display { font-family: 'Hello', sans-serif; color: var(--rosa-destaque); font-size: 2.5rem; margin-top: 30px; }

        /* BOTÕES SEM BORDA PRETA */
        .cal-btn { border: none; outline: none; background: var(--rosa-destaque); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: 600; }

        /* TREINOS (QUADRADOS LADO A LADO) */
        .stats-container { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card { flex: 1; padding: 25px; border-radius: 20px; background: #fffafb; border: 1px solid var(--borda); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.85rem; font-weight: 500; color: var(--texto); }
        .stat-card p { margin: 10px 0 0; font-size: 2.2rem; font-weight: 600; color: var(--pink-vibrante); }

        /* CALENDÁRIO & GRIDS */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { border: 1px solid var(--borda); min-height: 110px; padding: 8px; border-radius: 10px; background: #fff; }
        .workout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .workout-day { border: 1px solid var(--borda); padding: 15px; border-radius: 15px; background: #fffafb; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>Planner</h1>
        <div class="menu-item active" onclick="showPage('inicio', this)">🏠 início</div>
        <div class="menu-item" onclick="showPage('habitos', this)">✨ hábitos</div>
        <div class="menu-item" onclick="showPage('treinos', this)">💪 treinos</div>
        <div class="sidebar-footer"><a href="caderno.html" style="color:var(--rosa-destaque); text-decoration:none; font-size:0.8rem;">📖 abrir caderno</a></div>
    </div>
    <div class="main-content">
        <section id="inicio" class="page-section active">
            <h2 id="month-display">mês</h2>
            <div class="calendar-grid" id="calendar-grid"></div>
        </section>
        <section id="habitos" class="page-section">
            <h2 class="section-title">✨ habit tracker</h2>
            <button class="cal-btn" onclick="addHabitRow()">+ novo hábito</button>
            <table id="habit-table" style="width:100%; margin-top:15px; font-size:0.8rem;"><tbody id="habit-body"></tbody></table>
        </section>
        <section id="treinos" class="page-section">
            <h2 class="section-title">💪 foco no treino</h2>
            <div class="stats-container">
                <div class="stat-card"><h3>meta semanal</h3><p id="week-count">0</p></div>
                <div class="stat-card"><h3>total mensal</h3><p id="month-count">0</p></div>
            </div>
            <div class="workout-grid" id="workout-days-container"></div>
        </section>
    </div>
    <script>
        /* Mesma lógica de renderCalendar, renderWorkouts e addHabitRow do código original */
        function showPage(id, el) { 
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
