<html lang="pt-br">
<head>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

    <style>
        :root {
            /* Paleta Chique com Personalidade (Bordô e Ouro) */
            --bordo-personalidade: #800020; 
            --ouro-destaque: #d4af37;        
            --caixa-fundo: rgba(255, 255, 255, 0.95); 
            --texto-principal: #333;
            --fundo-celestial: linear-gradient(135deg, #fffdf5 0%, #ffe0b2 25%, #f8bbd0 50%, #f48fb1 75%, #fffdf5 100%); 
            --borda: #e1bee7; 
            --nude-suave: #fffafb;
            --azul-agua: #80deea; 
            --azul-deep: #00838f;
        }

        * { box-sizing: border-box; }
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: var(--fundo-celestial); 
            color: var(--texto-principal); 
            overflow: hidden; 
        }

        /* Sidebar Chique e Clean */
        .sidebar { 
            width: 260px; 
            background: rgba(255, 255, 255, 0.98); 
            border-right: 1px solid var(--borda); 
            display: flex; 
            flex-direction: column; 
            padding: 25px; 
            flex-shrink: 0;
            transition: 0.3s; 
            position: relative; 
            z-index: 100;
        }
        .sidebar.closed { margin-left: -260px; }
        
        /* Botão ☰ Elegante */
        .toggle-btn {
            position: absolute; right: -40px; top: 20px; 
            background: var(--bordo-personalidade); 
            border: none; color: var(--ouro-destaque); 
            width: 30px; height: 30px; border-radius: 0 8px 8px 0;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        /* Títulos Chiques com Serifada Bodoni-style */
        .sidebar h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.8rem; 
            color: var(--bordo-personalidade); 
            text-align: center; 
            margin-bottom: 40px; 
            margin-top: 0; 
            font-weight: 700; 
            letter-spacing: -1px;
        }
        
        .menu-item { 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-size: 1rem; 
            transition: 0.3s; 
            color: #555;
            font-weight: 400;
        }
        .menu-item.active { 
            background: rgba(128, 0, 32, 0.08); 
            font-weight: 600; 
            color: var(--bordo-personalidade); 
        }
        
        .sidebar-footer { margin-top: auto; padding-bottom: 20px; }
        .link-caderno { 
            text-decoration: none; 
            color: var(--bordo-personalidade); 
            font-size: 1rem; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            padding: 15px; 
            font-weight: 600;
        }

        /* Main Content mais Clean */
        .main-content { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 40px; 
            background: rgba(255, 255, 255, 0.95); 
            margin: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px rgba(128, 0, 32, 0.05); 
        }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Títulos de Seção Chiques */
        h2.section-title, #month-display, #wishlist-title { 
            font-family: 'Playfair Display', serif; 
            color: var(--bordo-personalidade); 
            font-size: 2.2rem; 
            font-weight: 600; 
            margin-top: 40px;
        }
        h2.section-title { border-left: 6px solid var(--ouro-destaque); padding-left: 15px; }
        #wishlist-title { text-align: center; margin-bottom: 30px; font-weight: 700;}

        /* Botões Chiques (Bordô com Ouro) */
        .cal-btn { 
            border: 1px solid var(--bordo-personalidade);
            outline: none; 
            background: var(--bordo-personalidade); 
            color: var(--ouro-destaque); 
            padding: 8px 18px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 600; 
            font-size: 0.9rem;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
