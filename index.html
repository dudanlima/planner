<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        @font-face { 
            font-family: 'Hello'; 
            src: url('fonts/Hello.otf') format('opentype'); 
        }

        :root {
            --rosa-claro: #fff0f5; --rosa-destaque: #ffb6c1; --pink-vibrante: #ff69b4;
            --azul-agua: #b3e5fc; --azul-deep: #03a9f4; --texto: #444;
            --borda: #fce4ec; --verde-suave: #e8f5e9; --vermelho-suave: #ffebee;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; margin: 0; display: flex; height: 100vh; background-color: #fff9fb; color: var(--texto); overflow: hidden; }

        .sidebar { width: 260px; background: white; border-right: 1px solid var(--borda); display: flex; flex-direction: column; padding: 25px; flex-shrink: 0; }
        .sidebar h1 { font-family: 'Hello', cursive; font-size: 3.5rem; color: var(--rosa-destaque); text-align: center; margin-bottom: 30px; margin-top: 0; font-weight: normal; }
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 0.9rem; }
        .menu-item.active { background: var(--rosa-claro); border-color: var(--rosa-destaque); font-weight: 600; color: var(--pink-vibrante); }

        .main-content { flex-grow: 1; overflow-y: auto; padding: 40px; background: white; margin: 20px; border-radius: 30px; box-shadow: 0 10px 40px rgba(255, 182, 193, 0.1); }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        h2.section-title, #month-display { font-family: 'Hello', sans-serif; color: var(--rosa-destaque); font-size: 2.2rem; text-transform: lowercase; font-weight: normal; }
        h2.section-title { border-left: 4px solid var(--rosa-claro); padding-left: 10px; margin-top: 40px; }

        .cal-btn { border: none; outline: none; background: var(--rosa-claro); color: var(--pink-vibrante); padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        /* HABIT TRACKER - SEM RETÂNGULO */
        #habit-body input[type="text"] { border: none !important; outline: none !important; background: transparent; width: 100%; padding: 5px; font-family: inherit; }
        #habit-body input[type="checkbox"] { transform: scale(1.2); accent-color: var(--pink-vibrante); cursor: pointer; }

        /* WATER CUPS */
        .water-container { background: #f0faff; padding: 20px; border-radius: 20px; margin-bottom: 30px; text-align: center; }
        .cup { width: 30px; height: 40px; border: 2.5px solid var(--azul-deep); border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; cursor: pointer; display: inline-block; margin: 5px; position: relative; background: white; transition: 0.3s; }
        .cup.filled { background: var(--azul-agua); }
        .cup.filled::after { content: '💧'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 10px; }

        /* TREINOS */
        .stats-container { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-card { flex: 1; padding: 20px; border-radius: 20px; background: #fffafb; border: 1px solid var(--borda); text-align: center; transition: 0.5s; }
        .stat-card p { margin: 5px 0 0; font-size: 1.8rem; font-weight: 600; color: var(--pink-vibrante); }
        .meta-atingida { background: var(--verde-suave) !important; border-color: #81c784 !important; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-cell { border: 1px solid var(--borda); min-height: 110px; padding: 8px; border-radius: 10px; background: #fff; position: relative; }
        .day-cell textarea { width: 100%; border: none; outline: none; height: 65px; resize: none; font-size: 0.75rem; background: transparent; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Planner</h1>
        <div class="menu-item active" onclick="showPage('inicio', this)">🏠 início</div>
        <div class="menu-item" onclick="showPage('habitos', this)">✨ hábitos</div>
        <div class="menu-item" onclick="showPage('treinos', this)">💪 treinos</div>
        <div class="menu-item" onclick="showPage('financas', this)">💰 finanças</div>
        <div class="sidebar-footer"><a href="caderno.html" style="color:var(--rosa-destaque); text-decoration:none; font-size:0.8rem;">📖 abrir caderno</a></div>
    </div>

    <div class="main-content">
        <section id="inicio" class="page-section active">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button class="cal-btn" onclick="moveMonth(-1)">❮</button>
                <h2 id="month-display" style="margin:0;">mês</h2>
                <button class="cal-btn" onclick="moveMonth(1)">❯</button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </section>

        <section id="habitos" class="page-section">
            <div class="water-container">
                <p style="font-family: 'Hello'; font-size: 2.5rem; color: var(--azul-deep); margin:0;">beba água 💧</p>
                <div id="water-cups"></div>
                <p id="water-stats" style="font-size: 0.85rem; color: var(--azul-deep); font-weight: 600;"></p>
            </div>
            <h2 class="section-title">✨ habit tracker</h2>
            <button class="cal-btn" style="background:var(--rosa-destaque); color:white; margin-bottom:15px;" onclick="addHabitRow()">+ novo hábito</button>
            <div style="overflow-x: auto; border: 1px solid var(--borda); border-radius: 15px;">
                <table style="width:100%; border-collapse: collapse; font-size: 0.75rem;">
                    <thead><tr id="habit-header" style="background: var(--rosa-claro); color: var(--pink-vibrante);"><th>Hábito</th></tr></thead>
                    <tbody id="habit-body"></tbody>
                </table>
            </div>
        </section>

        <section id="treinos" class="page-section">
            <h2 class="section-title">💪 foco no treino</h2>
            <div class="stats-container">
                <div id="card-weekly" class="stat-card"><h3>meta semanal (min 4x)</h3><p id="week-count">0</p></div>
                <div class="stat-card"><h3>total mensal</h3><p id="month-count">0</p></div>
            </div>
            <div class="workout-grid" id="workout-container" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap:10px;"></div>
        </section>

        <section id="financas" class="page-section">
            <h2 class="section-title">💰 finanças</h2>
            <div class="finance-summary" style="display:flex; gap:10px; margin-bottom:20px;">
                <div style="flex:1; background:var(--verde-suave); padding:15px; border-radius:15px;">Entradas: <span id="total-in">0.00</span></div>
                <div style="flex:1; background:var(--vermelho-suave); padding:15px; border-radius:15px;">Saídas: <span id="total-out">0.00</span></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                <div style="background:#fffafb; border:1px solid var(--borda); padding:15px; border-radius:15px;">
                    <h3>Entradas</h3><table style="width:100%"><tbody id="f-entradas"></tbody></table><button class="cal-btn" onclick="addFin('entradas')">+</button>
                </div>
                <div style="background:#fffafb; border:1px solid var(--borda); padding:15px; border-radius:15px;">
                    <h3>Saídas</h3><table style="width:100%"><tbody id="f-saidas"></tbody></table><button class="cal-btn" onclick="addFin('saidas')">+</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        let currentDate = new Date();
        const realToday = new Date(); realToday.setHours(0,0,0,0);

        function showPage(id, el) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'treinos') renderWorkouts();
            if(id === 'habitos') { renderWater(); initHabits(); }
            if(id === 'financas') renderFinance();
        }

        // WATER CUPS
        function renderWater() {
            const container = document.getElementById('water-cups');
            const saved = JSON.parse(localStorage.getItem(`water-${realToday.toDateString()}`)) || Array(12).fill(0);
            container.innerHTML = ''; let total = 0;
            saved.forEach((f, i) => {
                let c = document.createElement('div'); c.className = `cup ${f ? 'filled' : ''}`;
                if(f) total += 180;
                c.onclick = () => { saved[i] = saved[i] ? 0 : 1; localStorage.setItem(`water-${realToday.toDateString()}`, JSON.stringify(saved)); renderWater(); };
                container.appendChild(c);
            });
            document.getElementById('water-stats').innerText = `total: ${total}ml tomados hoje`;
        }

        // FOGOS DE ARTIFÍCIO
        function dispararFogos() { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ff69b4', '#ffb6c1', '#ffffff'] }); }

        // CALENDÁRIO
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            const m = currentDate.getMonth(), y = currentDate.getFullYear();
            document.getElementById('month-display').innerText = `${currentDate.toLocaleString('pt-br', { month: 'long' })} ${y}`;
            const first = new Date(y, m, 1).getDay();
            for(let i=0; i<first; i++) grid.appendChild(document.createElement('div'));
            for(let d=1; d<=new Date(y, m+1, 0).getDate(); d++) {
                let key = `cal-${y}-${m}-${d}`;
                let cell = document.createElement('div'); cell.className = 'day-cell';
                cell.innerHTML = `<span>${d}</span><textarea oninput="localStorage.setItem('${key}', this.value)">${localStorage.getItem(key)||''}</textarea>`;
                grid.appendChild(cell);
            }
        }

        // HABITS
        function initHabits() {
            const h = document.getElementById('habit-header'); if(h.cells.length < 2) for(let i=1; i<=31; i++) h.innerHTML += `<th>${i}</th>`;
            loadHabits();
        }
        function addHabitRow() {
            const b = document.getElementById('habit-body'); const tr = document.createElement('tr');
            tr.innerHTML = `<td><input type="text" placeholder="Hábito..." onchange="saveHabits()"></td>` + Array(31).fill('<td><input type="checkbox" onchange="saveHabits()"></td>').join('');
            b.appendChild(tr);
        }
        function saveHabits() {
            const data = Array.from(document.querySelectorAll('#habit-body tr')).map(r => ({
                n: r.cells[0].querySelector('input').value,
                c: Array.from(r.querySelectorAll('input[type="checkbox"]')).map(cb => cb.checked)
            }));
            localStorage.setItem('habits-2026', JSON.stringify(data));
        }
        function loadHabits() {
            const data = JSON.parse(localStorage.getItem('habits-2026')) || [];
            const b = document.getElementById('habit-body'); b.innerHTML = '';
            data.forEach(h => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><input type="text" value="${h.n}" onchange="saveHabits()"></td>` + h.c.map(c => `<td><input type="checkbox" ${c?'checked':''} onchange="saveHabits()"></td>`).join('');
                b.appendChild(tr);
            });
        }

        // WORKOUTS
        function renderWorkouts() {
            const cont = document.getElementById('workout-container'); cont.innerHTML = '';
            const start = new Date(realToday); start.setDate(realToday.getDate() - realToday.getDay() + (realToday.getDay() === 0 ? -6 : 1));
            let w = 0, mCount = 0;
            for(let d=1; d<=31; d++) if(localStorage.getItem(`w-2026-${realToday.getMonth()}-${d}`) === 'true') mCount++;
            ['seg','ter','qua','qui','sex','sab','dom'].forEach((day, i) => {
                let d = new Date(start); d.setDate(start.getDate() + i);
                let key = `w-2026-${d.getMonth()}-${d.getDate()}`, chk = localStorage.getItem(key) === 'true';
                if(chk) w++;
                cont.innerHTML += `<div class="workout-day"><h4>${day}</h4><textarea onchange="localStorage.setItem('t-${key}', this.value)">${localStorage.getItem('t-'+key)||''}</textarea><br><input type="checkbox" ${chk?'checked':''} onclick="toggleW('${key}', this.checked)"></div>`;
            });
            document.getElementById('week-count').innerText = w > 4 ? 4 : w;
            document.getElementById('month-count').innerText = mCount;
            const card = document.getElementById('card-weekly');
            if(w >= 4) { if(!card.classList.contains('meta-atingida')) dispararFogos(); card.classList.add('meta-atingida'); }
            else card.classList.remove('meta-atingida');
        }
        function toggleW(k, v) { localStorage.setItem(k, v); renderWorkouts(); }

        // FINANCE
        function renderFinance() {
            let tin = 0, tout = 0;
            ['entradas', 'saidas'].forEach(type => {
                const b = document.getElementById(`f-${type}`); b.innerHTML = '';
                let data = JSON.parse(localStorage.getItem(`fin-${type}`)) || [];
                data.forEach((item, i) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td><input value="${item.n||''}" onblur="saveF('${type}',${i},'n',this.value)"></td><td><input type="number" value="${item.v||''}" onblur="saveF('${type}',${i},'v',this.value)"></td>`;
                    if(type === 'entradas') tin += parseFloat(item.v||0); else tout += parseFloat(item.v||0);
                    b.appendChild(tr);
                });
            });
            document.getElementById('total-in').innerText = tin.toFixed(2); document.getElementById('total-out').innerText = tout.toFixed(2);
        }
        function saveF(t,i,f,v) { let d = JSON.parse(localStorage.getItem(`fin-${t}`)) || []; d[i][f]=v; localStorage.setItem(`fin-${t}`, JSON.stringify(d)); renderFinance(); }
        function addFin(t) { let d = JSON.parse(localStorage.getItem(`fin-${t}`)) || []; d.push({}); localStorage.setItem(`fin-${t}`, JSON.stringify(d)); renderFinance(); }

        function moveMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }
        renderCalendar();
    </script>
</body>
</html>
