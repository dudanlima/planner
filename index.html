<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Planner 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rosa-claro: #fff0f5;
            --rosa-destaque: #ffb6c1;
            --texto: #555;
            --borda: #fce4ec;
            --verde-suave: #e8f5e9;
            --vermelho-suave: #ffebee;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            padding: 20px; 
            background-color: #fff9fb; 
            color: var(--texto);
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.15); 
        }

        h1 { text-align: center; font-weight: 300; color: var(--rosa-destaque); letter-spacing: 3px; }
        h2 { font-size: 1.1rem; color: var(--rosa-destaque); margin-top: 40px; border-left: 4px solid var(--rosa-claro); padding-left: 10px; text-transform: lowercase; }

        /* Habit Tracker */
        .tracker-wrapper { overflow-x: auto; margin-top: 15px; border-radius: 10px; border: 1px solid var(--borda); }
        table { border-collapse: collapse; width: 100%; background: white; }
        th { background-color: var(--rosa-claro); padding: 10px; font-size: 10px; border: 1px solid var(--borda); }
        td { border: 1px solid var(--borda); padding: 8px; text-align: center; }
        .habit-name { text-align: left; min-width: 180px; padding-left: 15px; outline: none; }

        /* Finanças Estilo Planilha */
        .finance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        @media (max-width: 768px) { .finance-grid { grid-template-columns: 1fr; } }

        .finance-table { width: 100%; margin-top: 10px; font-size: 0.9rem; }
        .finance-table th { font-size: 12px; padding: 10px; }
        .finance-table td { padding: 5px; }
        
        .editable-finance { width: 100%; border: none; outline: none; font-family: inherit; color: var(--texto); text-align: center; }
        .entry-row { background-color: var(--verde-suave); }
        .exit-row { background-color: var(--vermelho-suave); }

        .summary-box { display: flex; justify-content: space-around; background: var(--rosa-claro); padding: 15px; border-radius: 12px; margin-top: 20px; text-align: center; }
        .summary-item span { display: block; font-size: 0.8rem; text-transform: uppercase; }
        .summary-item strong { font-size: 1.2rem; color: var(--rosa-destaque); }

        input[type="checkbox"] { accent-color: var(--rosa-destaque); transform: scale(1.1); }
    </style>
</head>
<body>

    <div class="container">
        <h1>planner 2026</h1>

        <h2>✨ habit tracker</h2>
        <div class="tracker-wrapper">
            <table>
                <thead><tr id="header-days"><th class="habit-name">HABIT</th></tr></thead>
                <tbody id="habit-body">
                    <tr><td class="habit-name" contenteditable="true" data-id="h1">beber 2l de água</td></tr>
                    <tr><td class="habit-name" contenteditable="true" data-id="h2">treino membros superiores</td></tr>
                    <tr><td class="habit-name" contenteditable="true" data-id="h3">estudar italiano</td></tr>
                    <tr><td class="habit-name" contenteditable="true" data-id="h4">avançar no tcc</td></tr>
                </tbody>
            </table>
        </div>

        <h2>💰 controle financeiro - março</h2>
        
        <div class="summary-box">
            <div class="summary-item"><span>entradas</span><strong id="total-in">R$ 0,00</strong></div>
            <div class="summary-item"><span>saídas</span><strong id="total-out">R$ 0,00</strong></div>
            <div class="summary-item"><span>saldo</span><strong id="total-balance">R$ 0,00</strong></div>
        </div>

        <div class="finance-grid">
            <div>
                <h3>entradas</h3>
                <table class="finance-table">
                    <thead><tr><th>descrição</th><th>valor (R$)</th></tr></thead>
                    <tbody id="entries-body">
                        <tr class="entry-row">
                            <td><input class="editable-finance" placeholder="ex: salário" data-fin="desc-in-1"></td>
                            <td><input class="editable-finance val-in" type="number" placeholder="0.00" data-fin="val-in-1"></td>
                        </tr>
                        <tr class="entry-row">
                            <td><input class="editable-finance" placeholder="ex: extra" data-fin="desc-in-2"></td>
                            <td><input class="editable-finance val-in" type="number" placeholder="0.00" data-fin="val-in-2"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div>
                <h3>saídas</h3>
                <table class="finance-table">
                    <thead><tr><th>descrição</th><th>valor (R$)</th></tr></thead>
                    <tbody id="exits-body">
                        <tr class="exit-row">
                            <td><input class="editable-finance" placeholder="ex: faculdade" data-fin="desc-out-1"></td>
                            <td><input class="editable-finance val-out" type="number" placeholder="0.00" data-fin="val-out-1"></td>
                        </tr>
                        <tr class="exit-row">
                            <td><input class="editable-finance" placeholder="ex: aluguel" data-fin="desc-out-2"></td>
                            <td><input class="editable-finance val-out" type="number" placeholder="0.00" data-fin="val-out-2"></td>
                        </tr>
                        <tr class="exit-row">
                            <td><input class="editable-finance" placeholder="ex: lazer" data-fin="desc-out-3"></td>
                            <td><input class="editable-finance val-out" type="number" placeholder="0.00" data-fin="val-out-3"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- Lógica do Habit Tracker ---
        const header = document.getElementById('header-days');
        const bodyRows = document.querySelectorAll('#habit-body tr');
        for (let i = 1; i <= 31; i++) {
            let th = document.createElement('th'); th.innerText = i; header.appendChild(th);
            bodyRows.forEach((row) => {
                let td = document.createElement('td'); let cb = document.createElement('input');
                cb.type = 'checkbox'; let id = row.firstElementChild.getAttribute('data-id') + '-d' + i;
                cb.id = id; cb.onclick = () => localStorage.setItem(id, cb.checked);
                cb.checked = localStorage.getItem(id) === 'true';
                td.appendChild(cb); row.appendChild(td);
            });
        }
        bodyRows.forEach((row) => {
            const cell = row.firstElementChild; const id = cell.getAttribute('data-id') + '-t';
            cell.innerText = localStorage.getItem(id) || cell.innerText;
            cell.onblur = () => localStorage.setItem(id, cell.innerText);
        });

        // --- Lógica das Finanças ---
        const finInputs = document.querySelectorAll('.editable-finance');
        
        function calculate() {
            let totalIn = 0; let totalOut = 0;
            document.querySelectorAll('.val-in').forEach(i => totalIn += Number(i.value) || 0);
            document.querySelectorAll('.val-out').forEach(i => totalOut += Number(i.value) || 0);
            
            document.getElementById('total-in').innerText = `R$ ${totalIn.toFixed(2)}`;
            document.getElementById('total-out').innerText = `R$ ${totalOut.toFixed(2)}`;
            document.getElementById('total-balance').innerText = `R$ ${(totalIn - totalOut).toFixed(2)}`;
        }

        finInputs.forEach(input => {
            const id = input.getAttribute('data-fin');
            input.value = localStorage.getItem(id) || "";
            input.oninput = () => {
                localStorage.setItem(id, input.value);
                calculate();
            };
        });

        calculate(); // Inicializa os cálculos
    </script>
</body>
</html>
